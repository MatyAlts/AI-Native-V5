      senal_alerta: No lo habia pensado o quiere agregar validacion que el TP no pide.
    n4:
    - texto: Si simplificas escribiendo solo el limite superior en cada elif (porque el inferior esta implicito por el orden), ¿el codigo es mas legible o mas confuso? ¿Para quien?
      senal_comprension: 'Reflexiona sobre legibilidad para audiencias distintas: el programador experto vs el novato.'
      senal_alerta: Responde dogmaticamente sin pensar en audiencias.
    - texto: ¿Como le explicarias a alguien que solo sabe matematica que la condicion elif 3 <= x < 4 se puede escribir como elif x < 4 despues del primer if?
      senal_comprension: 'Usa la metafora del descarte: si llego aca, ya se que paso el primer filtro.'
      senal_alerta: No puede articular la explicacion.
  misconceptions:
  - descripcion: 'M7: Duda sobre redundancia de limites en elif: el estudiante cree que debe escribir elif m >= 3 and m < 4 porque ''si no, como sabe Python que es el rango correcto''.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Si ya ejecutaste el if m < 3 y fue falso, ¿que sabes con certeza sobre m en ese punto? ¿Es necesario volver a preguntar si m >= 3?
  - descripcion: 'M2: Lectura inclusive de los umbrales: el estudiante pone 3.0 en ''Muy leve'' en vez de ''Leve''.'
    probabilidad_estimada: 0.6
    pregunta_diagnostica: 'El enunciado dice ''Leve: mayor o igual a 3 y menor que 4''. Si la magnitud es exactamente 3.0, ¿en que categoria entra segun esa frase?'
  - descripcion: 'Conversion a int en lugar de float: el estudiante usa int() y pierde los decimales.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: La magnitud, ¿puede ser decimal en la practica? Si el usuario ingresa 3.5 y vos haces int(input()), ¿que pasa? Probalo.
  respuesta_pista:
  - nivel: 1
    pista: 'Estructura: if-elif-elif-elif-elif-else con seis ramas. La clave: convertis la magnitud con float, no con int. Las condiciones de elif solo necesitan el limite superior porque el inferior esta
      implicito por la cadena. Te ayudo con la primera: if m < 3: print(''Muy leve''). ¿Cual es la condicion del primer elif para ''Leve''?'
  - nivel: 2
    pista: 'elif m < 4: print(''Leve'') — solo el limite superior. Python ya sabe que m >= 3 porque el if anterior fue falso. El mismo patron aplica a cada rama: elif m < 5, elif m < 6, elif m < 7, else:
      Extremo.'
  - nivel: 3
    pista: "m = float(input(\"Magnitud del terremoto: \"))\nif m < 3:\n    print(\"Muy leve\")\nelif m < 4:\n    print(\"Leve\")\nelif m < 5:\n    print(\"Moderado\")\nelif m < 6:\n    print(\"Fuerte\"\
      )\nelif m < 7:\n    print(\"Muy Fuerte\")\nelse:\n    print(\"Extremo\")\n"
  - nivel: 4
    pista: La cadena elif implica el limite inferior de cada rango. Si llego al elif m < 4 es porque el if m < 3 fue falso, entonces ya se que m >= 3. No hace falta escribirlo.
  heuristica_cierre:
    tests_min_pasados: 5
    heuristica: El tutor puede cerrar cuando el estudiante use float(), haya probado los umbrales exactos (3.0, 4.0, 7.0) mas un valor decimal intermedio y uno extremo, y pueda explicar por que el limite
      inferior no se repite en cada elif.
  anti_patrones:
  - patron: Reescritura del codigo del estudiante
    descripcion: El tutor dice 'te muestro una forma mas prolija' y reescribe el codigo con comparacion encadenada o con elif simplificado, si el codigo del estudiante es correcto.
    mensaje_orientacion: Tu codigo funciona. Las clases que listaste son seis pero solo probaste tres. ¿Cuales tres clases no probaste y por que importa que pruebes al menos una de cada una?
  - patron: Dictado de estructura sintactica antes de identificar casos
    descripcion: El tutor dice 'esto va con if-elif-elif-elif-elif-else' antes de que el estudiante enumere las seis categorias.
    mensaje_orientacion: ¿Cuantas categorias distingue el enunciado? ¿Cuales son los rangos exactos? Antes de elegir la estructura, contame que categorias tenes que cubrir.
  - patron: Introduccion anticipada de float sin pregunta
    descripcion: El tutor dice directamente 'usa float, no int' sin haber preguntado si la magnitud puede ser decimal.
    mensaje_orientacion: La magnitud, ¿puede ser decimal en la practica de sismologia? ¿Que pasa si el usuario ingresa 3.5 y vos usas int(input())? Probalo.
