- titulo: E7 — Operaciones aritmeticas con dos enteros
  enunciado_md: 'Crear un programa que pida al usuario dos numeros enteros distintos de 0 y

    muestre por pantalla el resultado de sumarlos, restarlos, multiplicarlos y

    dividirlos.


    *Vinculo con material de catedra*: Refuerzo de operadores aritmeticos del

    apunte Secuenciales seccion 4.1 y Actividad II seccion 2. La restriccion

    "distintos de 0" introduce sutilmente el problema de la division por cero

    sin requerir condicional para implementarlo.

    '
  inicial_codigo: 'num1 = int(input("Ingrese el primer numero entero (distinto de 0): "))

    num2 = int(input("Ingrese el segundo numero entero (distinto de 0): "))

    # calcular suma, resta, multiplicacion, division

    '
