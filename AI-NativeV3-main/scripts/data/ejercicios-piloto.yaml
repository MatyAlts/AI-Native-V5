  banco_preguntas:
    n1:
    - texto: Reescribi la formula del IMC con tus palabras, sin notacion matematica.
      senal_comprension: El estudiante dice algo como 'peso dividido la altura al cuadrado'.
      senal_alerta: El estudiante repite la formula con notacion matematica; pedirle que la diga como en una receta.
    - texto: '¿En que unidad va la altura: metros o centimetros? Si el usuario ingresa 173 pensando que son centimetros, ¿tu programa lo va a calcular bien?'
      senal_comprension: El estudiante razona que la formula requiere metros y que 173 daria un IMC absurdamente chico.
      senal_alerta: El estudiante no nota la diferencia; mostrar el calculo con 173 y observar el absurdo del resultado.
    - texto: ¿La altura puede ser entera o necesita ser decimal? ¿Y el peso?
      senal_comprension: El estudiante razona que altura necesita decimal (1.75) pero peso puede ser entero (70).
      senal_alerta: El estudiante propone int para ambos; mostrar el problema con altura 1.75.
    n2:
    - texto: Para elevar al cuadrado en Python, ¿que operador usas? ¿Y se te ocurre otra forma equivalente?
      senal_comprension: El estudiante nombra ** y reconoce que altura * altura es operacionalmente equivalente.
      senal_alerta: El estudiante intenta sqrt o pow sin razonarlo; redirigir al apunte 4.1.
    - texto: ¿Vas a calcular el IMC en una sola linea o en dos pasos? Las dos son validas.
      senal_comprension: El estudiante elige una y justifica.
      senal_alerta: El estudiante hace todo en una linea muy larga sin separar; ofrecer la version en dos pasos.
    - texto: Para los inputs de altura y peso, ¿int o float? Justifica por que uno de los dos necesariamente float.
      senal_comprension: El estudiante razona que la altura es decimal y por eso float.
      senal_alerta: El estudiante elige int para ambos; mostrar que 1.75 como int trunca a 1.
    n3:
    - texto: Calcula a mano el IMC de alguien que pese 70 kg y mida 1.75 m. Despues corre el programa y compara.
      senal_comprension: El estudiante calcula 70 / 3.0625 = 22.86 aproximadamente y el programa lo confirma.
      senal_alerta: El estudiante corre sin calcular; pedir la anticipacion antes.
    - texto: ¿Que pasa si la altura es 0? ¿Tu programa explota o devuelve algo raro?
      senal_comprension: El estudiante predice error de division por cero y al probarlo lo confirma.
      senal_alerta: El estudiante no anticipa; pedirle que conecte con la conversacion del Ejercicio 7 sobre division por cero.
    - texto: ¿Que pasa si el peso es 0? El programa no explota pero el resultado es absurdo. ¿Lo notas?
      senal_comprension: El estudiante observa que da IMC 0 y razona que un peso de 0 no tiene sentido medico aunque si matematico.
      senal_alerta: El estudiante no diferencia error tecnico de resultado absurdo; mostrar el contraste.
    - texto: 'Pregunta extra-codigo: ¿el IMC tiene sentido como indicador para todas las personas?'
      senal_comprension: El estudiante elabora una respuesta como 'el IMC no diferencia masa muscular de masa grasa'.
      senal_alerta: El estudiante dice que si porque es la formula que pide el enunciado; aceptar pero plantar la pregunta sobre limitaciones del indicador.
    n4:
    - texto: Si el sistema tuviera que calcular IMC de muchas personas seguidas, ¿que le agregarias para que sea mas util?
      senal_comprension: El estudiante propone categorizacion (bajo peso, normal, sobrepeso) o procesamiento masivo.
      senal_alerta: El estudiante no propone nada; aceptar y dejar la pregunta abierta para proximas unidades.
    - texto: Pensar en el Ejercicio 4 (area del circulo). ¿Que estructura tiene en comun con este ejercicio?
      senal_comprension: 'El estudiante reconoce el patron: input + casting + formula con potencia + print.'
      senal_alerta: El estudiante no ve la analogia; mostrar que ambos leen un dato, lo convierten, calculan con formula que incluye ** y lo imprimen.
