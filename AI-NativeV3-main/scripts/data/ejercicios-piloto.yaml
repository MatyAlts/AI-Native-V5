    mensaje_orientacion: 'Buena pregunta y la voy a contestar porque ya hiciste N2 completo. El dia de apertura pertenece al rango que arranca. El 21 de diciembre pertenece al rango del 21/12 al 20/3. Adopta
      esa convencion. Y ahora: con esa convencion, ¿que cambia exactamente en tu condicion para diciembre?'
  - patron: Anidamiento prematuro
    descripcion: El tutor dice 'aca necesitas un if dentro de otro if' antes de que el estudiante haya descubierto que las condiciones son jerarquicas.
    mensaje_orientacion: ¿Las condiciones que tenes son todas del mismo tipo, o algunas dependen de otras? ¿Que informacion necesitas conocer primero — el hemisferio o la fecha — para saber que estacion
      imprimir?
  - patron: Cierre prematuro sin prueba de casos que cruzan el ano
    descripcion: El tutor cierra sin que el estudiante haya probado fechas en enero, febrero y principios de marzo (el rango que cruza diciembre).
    mensaje_orientacion: 'Antes de cerrar: ¿probaste con fecha (N, 1, 15)? ¿Y con (N, 3, 20) y (N, 3, 21)? Esos son los casos criticos del rango que cruza el fin de ano.'
- titulo: E1 — Caja del Kiosco
  enunciado_md: "Simular una compra con validaciones y calculo de total.\n\n- Pedir nombre del cliente (solo letras, validar con `.isalpha()` en `while`).\n- Pedir cantidad de productos a comprar (numero\
    \ entero positivo, validar con `.isdigit()` en `while`; debe ser mayor que cero).\n- Por cada producto (usar `for`):\n  - Pedir precio (entero, validar con `.isdigit()`).\n  - Pedir si tiene descuento\
    \ S/N (validar con `while`, aceptar `s` o `n` en cualquier mayuscula/minuscula).\n  - Si tiene descuento, aplicar 10% al precio de ese producto.\n- Al final mostrar: total sin descuentos, total con\
    \ descuentos, ahorro total y promedio por producto (usar `float` y formatear con `:.2f`).\n\n**Validaciones obligatorias:** sin `try/except`, no aceptar vacio en nombre, cantidad mayor que cero.\n"
  inicial_codigo: null
  unidad_tematica: mixtos
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - while
    - for
    - input
    - print
    - len
    - isalpha
    - isdigit
    - lower
    - float
    - f-string :.2f
    conceptuales:
    - validacion estricta sin try/except
    - acumuladores inicializados antes del bucle
    - bucle for con cantidad conocida de iteraciones
    - bucle while como reintento de entrada invalida
    - condicion compuesta en while con or negado
    - promocion de tipos int a float en division
  test_cases:
  - id: t1
    name: 'Caso del enunciado: Ana, 3 productos con descuentos alternados'
    type: stdin_stdout
    code: ''
    expected: 'Total sin descuentos: 350.00

      Total con descuentos: 320.00

      Ahorro total: 30.00

      Promedio por producto: 106.67

      '
    is_public: true
    weight: 2
  - id: t2
    name: 'Nombre invalido rechazado: espacio, numero, vacio'
    type: stdin_stdout
    code: ''
    expected: El while vuelve a pedir nombre cuando se ingresa 'Ana Maria', 'Ana1' o cadena vacia
    is_public: true
    weight: 1
  - id: t3
    name: Cantidad cero rechazada
    type: stdin_stdout
    code: ''
    expected: El while vuelve a pedir cuando se ingresa 0
    is_public: true
    weight: 1
  - id: t4
    name: Cantidad negativa rechazada por isdigit
    type: stdin_stdout
    code: ''
    expected: El while rechaza -3 porque isdigit falla sobre el signo menos
    is_public: false
    weight: 1
  - id: t5
    name: Precio cero aceptado, descuento sobre cero da cero ahorro
    type: stdin_stdout
    code: ''
    expected: Precio 0 con descuento S no rompe el programa; ahorro adicional es 0.00
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Validacion de nombre con isalpha en while
      descripcion: El while rechaza cadena vacia, espacios y caracteres no alfabeticos usando not nombre.isalpha()
      puntaje_max: 1.5
    - nombre: Validacion de cantidad con isdigit y condicion adicional mayor que cero
      descripcion: La condicion del while combina isdigit y int(cantidad) > 0; distingue cero de positivo
      puntaje_max: 1.5
    - nombre: Bucle for con acumuladores inicializados
      descripcion: total_sin y total_con inicializados en 0 antes del for; se acumulan correctamente dentro
      puntaje_max: 2.0
    - nombre: Validacion de precio y descuento dentro del for
      descripcion: Cada producto tiene su while validador de precio y su while validador de descuento S/N
      puntaje_max: 1.5
    - nombre: Calculo y formateo de resultados con :.2f
      descripcion: Total sin descuentos, total con descuentos, ahorro y promedio mostrados con dos decimales
      puntaje_max: 1.5
    - nombre: Promedio calculado como float sobre cantidad correcta
      descripcion: El promedio divide total_con (o total_sin segun enunciado) entre cantidad; no usa division entera
      puntaje_max: 1.0
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: null
  banco_preguntas:
    n1:
    - texto: Contame con tus palabras que hace este programa, dividido en partes. Cuantas cosas distintas tiene que pedir, cuantas tiene que validar, y cuantas tiene que mostrar al final?
      senal_comprension: 'El estudiante identifica al menos cuatro partes: pedido y validacion de nombre, pedido y validacion de cantidad, ciclo por cada producto con validaciones internas, calculo y muestra
        de resultados al final.'
      senal_alerta: 'El estudiante describe solo el flujo general sin separar validaciones; reforzar con la pregunta de receta: cuales son los pasos en orden si tuvieras que darselo a alguien que nunca
        lo vio?'
    - texto: Cuales son las validaciones que el enunciado exige obligatoriamente? Nombralas una por una.
      senal_comprension: 'El estudiante enumera: nombre debe ser solo letras y no vacio, cantidad debe ser digito y mayor que cero, precio debe ser digito, respuesta de descuento debe ser s o n.'
      senal_alerta: El estudiante omite la validacion de cantidad mayor que cero o la valida con solo isdigit sin la condicion adicional; senalar que isdigit acepta el cero y que el enunciado prohibe cero.
    - texto: Si en cualquier validacion el enunciado pide usar while, que cosa el while esta esperando que pase para terminar?
      senal_comprension: El estudiante explicita que el while sigue mientras la entrada no cumpla la condicion, y termina cuando la cumple. Verbaliza la condicion de corte en terminos operativos.
      senal_alerta: El estudiante dice 'el while espera la respuesta correcta' sin precisar que hace verificar correcta; pedirle que escriba la condicion exacta del while sin codigo todavia, en lengua natural.
    n2:
    - texto: Si tuvieras que escribir esto como receta antes de codificar, cuales serian los pasos y en que orden los pondrias? Usa las palabras pedir, validar, repetir, acumular y mostrar.
      senal_comprension: 'El estudiante produce un pseudocodigo de cinco o seis pasos que incluye: pedir nombre, validar nombre, pedir cantidad, validar cantidad, repetir por cantidad de productos (pedir
        precio, validar precio, pedir descuento, validar descuento, calcular precio final, acumular en totales), mostrar resultados.'
      senal_alerta: El estudiante pone validar como un unico paso al final; corregir mostrando que cada pedido tiene su validacion adyacente, no agrupada.
    - texto: Para repetir la operacion por cada producto, usas while o for? Cual ventaja tiene cada uno aca?
      senal_comprension: El estudiante razona que for es preferible porque la cantidad de iteraciones se conoce de antemano (la cantidad de productos), mientras que while se reserva para validaciones donde
        no se sabe cuantos intentos seran.
      senal_alerta: El estudiante elige while True con break interno para iterar; admitir como variante pero pedirle que explique por que un for seria mas limpio dado que la cantidad esta fijada.
    - texto: Para totalizar el precio con y sin descuento, que necesitas antes del bucle for? Y dentro?
      senal_comprension: El estudiante razona que antes del for necesita inicializar total_sin = 0 y total_con = 0 (o equivalentes), y que dentro del for suma el precio sin descuento siempre y el precio
        con descuento que depende de la respuesta de descuento.
      senal_alerta: 'El estudiante propone empezar a sumar dentro del for sin haber inicializado las variables; senalar: que vale total_sin la primera vez que escribis total_sin = total_sin + precio si
        total_sin no existe todavia?'
    n3:
    - texto: 'Probalo con el caso del ejemplo del enunciado: cliente Ana, 3 productos de precios 100, 50 y 200 con descuentos s, n, s. Te da exactamente la salida esperada (total sin descuentos 350, total
        con descuentos 320.00, ahorro 30.00, promedio 106.67)?'
      senal_comprension: El estudiante prueba y obtiene los valores exactos; si difieren, identifica si es un problema de tipo (int vs float) o de calculo del promedio.
      senal_alerta: El estudiante obtiene un promedio entero (106 en lugar de 106.67); preguntarle por que; emerge la cuestion del cast a float o de la formateacion.
    - texto: Proba ahora con casos limite del validador. Que pasa si en el nombre escribis 'Ana Maria' con espacio, o 'Ana1' con numero, o solo apretas Enter? Vuelve a pedir el nombre en cada caso?
      senal_comprension: El estudiante prueba los tres casos y verifica que isalpha rechaza espacio, numero y vacio. Verbaliza que el while corta en cada caso y vuelve a pedir.
      senal_alerta: El estudiante asume que 'Ana Maria' pasa porque son letras; al probar, descubre que el espacio rompe isalpha.
    - texto: Proba la cantidad con cero, con negativo escrito como -3, con texto 'cinco', y con un decimal 3.5. Cuales tu while filtra y cuales deja pasar?
      senal_comprension: El estudiante prueba y razona que isdigit rechaza el signo negativo, rechaza texto, rechaza decimal y acepta cero. Para rechazar cero necesita la condicion adicional int(cantidad)
        > 0.
      senal_alerta: El estudiante no verifica negativo y queda con el bug; al probar, descubre que el comportamiento es correcto pero por razon distinta de la que esperaba.
    n4:
    - texto: Si el descuento variara por producto (algunos 10%, otros 20%), que partes del programa cambiarian y cuales se mantendrian igual?
      senal_comprension: El estudiante razona que la linea de calculo del precio con descuento cambiaria, que habria que pedir el descuento en porcentaje en cada iteracion con validacion adicional, pero
        que el while validador del nombre, el for principal y los acumuladores permanecen identicos.
      senal_alerta: El estudiante propone rehacer todo el programa; reorientar preguntando que linea exacta haria el calculo del nuevo precio con descuento.
    - texto: Si en lugar de un solo cliente tuvieras que procesar varios clientes en la misma ejecucion, que estructura agregas afuera del programa actual?
      senal_comprension: El estudiante razona que un while continuar == 's' alrededor de todo el flujo permite repetir el proceso completo; las variables del cliente actual deben reiniciarse en cada vuelta
        del while externo.
      senal_alerta: El estudiante propone un for sobre cantidad_clientes piendolo al inicio; admitir como variante pero notar que se pierde la flexibilidad de cerrar cuando uno quiera.
    - texto: Que del programa se beneficiaria si te dejaran usar listas? Y que se complica si te dejaran usar try/except?
      senal_comprension: El estudiante razona que listas permitirian guardar precio y descuento de cada producto para analisis posterior, y que try/except simplificaria la validacion reemplazando isdigit
        por intento de conversion. Reconoce que la prohibicion es pedagogica.
      senal_alerta: El estudiante no puede distinguir el rol de listas del de try/except como herramientas separadas.
