      senal_alerta: Asume que Python no distingue mayusculas y minusculas automaticamente.
    - texto: Si el string es 'hola', ¿cual es el ultimo caracter? ¿Como te lo da Python?
      senal_comprension: El ultimo caracter es 'a'; en Python se accede con s[-1] o s[len(s)-1].
      senal_alerta: No conoce la indexacion negativa de Python.
    - texto: ¿Que pasa si el string es 'HOLA'? ¿La A mayuscula es vocal para tu programa?
      senal_comprension: Reconoce la ambiguedad y propone normalizar con lower() o incluir 'AEIOU'.
      senal_alerta: Asume que la condicion ya cubre mayusculas sin verificar.
