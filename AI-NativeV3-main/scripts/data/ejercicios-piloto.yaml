  banco_preguntas:
    n1:
    - texto: 'Hay dos partes claras en este ejercicio: el login y el menu. Que pasa entre ellas? Que tiene que cumplirse para que se pase del primero al segundo?'
      senal_comprension: El estudiante identifica que el menu aparece solo si el login fue exitoso, y que tres intentos fallidos terminan el programa sin llegar al menu.
      senal_alerta: El estudiante propone meter el menu dentro del while de login; pedirle que separe en lengua natural primero login y despues menu con un if entre ambos.
    - texto: El menu tiene cuatro opciones pero el while debe seguir hasta que el usuario elija una sola de ellas (la opcion 4 Salir). Cuales tres opciones no cortan el while?
      senal_comprension: El estudiante razona que opciones 1, 2 y 3 ejecutan su accion y vuelven al menu, mientras que solo la 4 sale del while.
      senal_alerta: El estudiante propone un break en cada opcion; senalar que solo la 4 necesita break (o cambio de bandera) y las otras tres caen naturalmente al final del while.
    - texto: Cuales entradas pueden ser invalidas en el menu? Pensa todas las posibilidades antes de validar.
      senal_comprension: 'El estudiante enumera: no numerico (letras, simbolos), numerico fuera del rango 1 a 4, vacio. Distingue invalidacion por tipo de invalidacion por rango.'
      senal_alerta: El estudiante solo menciona numeros fuera de rango; preguntarle que pasa si el usuario ingresa la letra 'a'.
    n2:
    - texto: Para el contador de intentos limitados, que variable necesitas antes del while, que condicion pones en el while y donde incrementas dentro del while?
      senal_comprension: 'El estudiante razona: intentos = 0 antes del while; condicion combina intentos < 3 y no validadas (con bandera booleana); incremento al final de cada intento fallido, no en exito.'
      senal_alerta: El estudiante propone un while True con break interno; admitir como variante pero pedirle que escriba la version con condicion compuesta primero para comparar.
    - texto: Para el menu, que condicion pones en el while exterior y como manejas la opcion Salir?
      senal_comprension: El estudiante propone una bandera salir = False o uso de opcion != 4 directamente en la condicion del while. Justifica su eleccion.
      senal_alerta: El estudiante propone un for con numero fijo de iteraciones; pedirle que reconsidere porque no se sabe cuantas opciones elegira antes de salir.
    - texto: Para validar la opcion del menu, se necesita un while interno antes de procesarla, o se procesa directo y se ignora si es invalida? Que dice el enunciado?
      senal_comprension: El estudiante razona que el enunciado pide validacion estricta con isdigit y rango 1-4, lo cual implica un while validador interno antes del procesamiento.
      senal_alerta: El estudiante propone ignorar entradas invalidas con un if; senalar que el enunciado pide que se vuelva a pedir, no que se ignore.
    n3:
    - texto: 'Proba el flujo del ejemplo del enunciado: dos intentos donde el primero falla con ''xxx'' y el segundo acierta con ''python123''. Tu programa muestra exactamente Intento 1/3 y Intento 2/3
        en los lugares correctos?'
      senal_comprension: El estudiante prueba y verifica que el contador aparece como 1/3 antes del primer intento y 2/3 antes del segundo. Si el incremento esta mal posicionado, los numeros se desfasan.
      senal_alerta: 'El estudiante muestra Intento 0/3 al inicio porque incrementa despues del input; corregir con la lectura natural: el primer intento debe decir 1, no 0.'
    - texto: Proba los tres intentos fallidos. Se muestra 'Cuenta bloqueada' despues del tercero o intenta una cuarta vez?
      senal_comprension: El estudiante verifica que despues de tres fallidos el while corta y muestra Cuenta bloqueada. No hay cuarto input.
      senal_alerta: El estudiante tiene cuarto intento; hay un bug en la condicion del while; revisar si la condicion es <= 3 o < 3.
    - texto: 'En el menu, proba las entradas: 0, 5, ''a'', vacio, -1, 1.5. Cuales tu validacion filtra y cuales deja pasar?'
      senal_comprension: 'El estudiante prueba y razona caso por caso: 0 rechazado por rango, 5 rechazado por rango, ''a'' rechazado por isdigit(), vacio rechazado, -1 rechazado por isdigit (el signo no
        es digito), 1.5 rechazado por isdigit (el punto no es digito).'
      senal_alerta: El estudiante no prueba -1 o 1.5 asumiendo que ya estan cubiertos; pedirle que verifique.
    n4:
    - texto: Si los intentos fueran 5 en lugar de 3, que cambia en tu programa? Y si el bloqueo fuera temporal de 30 segundos en lugar de permanente?
      senal_comprension: El estudiante razona que la primera variante cambia solo la constante (de 3 a 5) y los mensajes; la segunda requiere agregar import time y time.sleep, lo cual sale del alcance del
        TP integrador pero el estudiante puede esbozar la idea.
      senal_alerta: El estudiante no puede distinguir que parte del codigo cambia en cada variante; revisar comprension de la condicion del while del login.
    - texto: Si las credenciales no fueran fijas sino que el sistema admitiera multiples usuarios, como se complicaria sin poder usar listas o diccionarios?
      senal_comprension: El estudiante reconoce que sin estructuras de datos compuestas, multiples usuarios requeriria variables individuales y comparaciones explicitas, lo cual escala mal. Es senal de
        que la prohibicion de listas en el integrador es pedagogica pero tambien marca un limite del enfoque.
      senal_alerta: 'El estudiante propone variables usuario1, usuario2, etc. sin reconocer el limite de escalabilidad; llevar la reflexion al extremo: y si hubiera 100 usuarios?'
    - texto: Por que el enunciado pone como bandera de exito una variable booleana en lugar de un break al if de credenciales correctas?
      senal_comprension: 'El estudiante razona que ambas son validas operativamente: la bandera booleana permite que el while termine naturalmente por condicion, lo cual es mas legible y testeable; el break
        corta abruptamente.'
      senal_alerta: El estudiante dice que una 'esta bien' y la otra 'esta mal' sin argumentar; pedirle que compare las dos versiones corriendo.
  misconceptions:
  - descripcion: Contador de intentos colocado dentro del if de credenciales correctas (incrementa en aciertos, no en fallos)
    probabilidad_estimada: 0.45
    pregunta_diagnostica: Proba con login correcto al primer intento. Tu mensaje dice Intento 1/3 o Intento 0/3?
  - descripcion: while con condicion simple (solo while intentos < 3) que continua pidiendo aun despues de login exitoso porque no se contempla la bandera de exito
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Si el usuario acierta en el segundo intento, tu while sigue pidiendo credenciales? Probalo.
  - descripcion: Validacion del menu con int(opcion) antes de isdigit(opcion), invirtiendo el orden y rompiendose con entrada no numerica
    probabilidad_estimada: 0.55
    pregunta_diagnostica: Proba ingresar la letra 'a' en el menu. Tu programa lanza error o vuelve a pedir?
  - descripcion: Minimo 6 caracteres confundido con minimo 6 digitos (la clave puede tener letras y simbolos, len() cuenta cualquier caracter)
    probabilidad_estimada: 0.3
    pregunta_diagnostica: Proba como nueva clave 'abcdef' (6 letras). Tu validacion la acepta o la rechaza? Por que?
  - descripcion: Comparacion de strings con == que falla por espacios o mayusculas no contempladas (aunque el enunciado usa credenciales exactas)
    probabilidad_estimada: 0.25
    pregunta_diagnostica: Proba ingresar 'Alumno' con mayuscula en lugar de 'alumno'. Que pasa?
  respuesta_pista:
  - nivel: 1
    pista: 'Antes de pedirme el while, contame: cuando queres que el while corte? Decimelo en espanol.'
  - nivel: 2
    pista: Probaste tu login? Si te da un comportamiento raro en el contador, en que parte exacta lo notas (al primer intento o al segundo)?
  - nivel: 3
    pista: Si el menu no para de pedirte opciones, cual es la bandera que tu while esta vigilando para cortar? Mostrame esa linea.
  - nivel: 4
    pista: La validacion del menu comparte estructura con la del nombre del E1. Una vez que tenes una, que reusas para la otra?
  heuristica_cierre:
    tests_min_pasados: 3
    heuristica: Cerrar cuando el estudiante (a) prueba al menos los flujos del ejemplo del enunciado, (b) prueba tres intentos fallidos completos verificando el corte por contador, (c) prueba el menu con
      al menos cuatro entradas distintas (valida, fuera de rango, no numerica, vacia), (d) verbaliza por que el while del login usa condicion compuesta. La fase 5 debe cerrar con al menos una respuesta
      sobre el cambio de constante de intentos.
  anti_patrones:
  - patron: Dar la condicion compuesta del while del login sin que el estudiante la formule primero en lengua natural
    descripcion: 'El tutor escribe while intentos < 3 and not logueado: directamente; el estudiante no produjo evento N2 sobre por que las dos partes son necesarias'
    mensaje_orientacion: Cuantas cosas tienen que ser verdad al mismo tiempo para que el login siga pidiendo credenciales? Decimelas en espanol, una por una.
  - patron: Sugerir break como alternativa al boolean sin que el estudiante explore la diferencia
    descripcion: El tutor sugiere usar break para simplificar el while del login sin que el estudiante haya comparado las dos versiones; se pierde la reflexion sobre patrones idiomaticos
    mensaje_orientacion: 'Tenes dos opciones: bandera booleana o break. Cuanto termines la version con bandera, contame cual te parece mas legible y por que.'
  - patron: Aceptar solucion con while True sin pedir condicion compuesta como alternativa
    descripcion: El tutor admite while True con break sin pedir que el estudiante escriba tambien la version con condicion compuesta; el patron de condicion compuesta es la habilidad evaluada
    mensaje_orientacion: Funciona con while True. Ahora escribe la misma logica con condicion compuesta en el while (sin True). Compara las dos.
- titulo: E3 — Agenda de Turnos con Nombres
  enunciado_md: "Sistema de agenda con variables individuales (SIN listas, SIN diccionarios, SIN sets, SIN tuplas).\n\n- Hay **2 dias de atencion**: Lunes (4 cupos) y Martes (3 cupos).\n- Pedir nombre del\
    \ operador (solo letras, validar con `.isalpha()` en `while`).\n- Menu repetitivo hasta salir con **5 opciones**:\n  1. Reservar turno\n  2. Cancelar turno por nombre\n  3. Ver agenda del dia\n  4.\
    \ Ver resumen general\n  5. Cerrar sistema\n\n**Reservar:** elegir dia (1=Lunes, 2=Martes), pedir nombre del paciente (solo letras), verificar que no este repetido en ese dia, guardar en el primer espacio\
    \ libre (`lunes1`, `lunes2`, ... `lunes4`; `martes1`, `martes2`, `martes3`).\n\n**Cancelar:** elegir dia, pedir nombre; si existe, dejar el espacio con cadena vacia `''`.\n\n**Ver agenda del dia:**\
    \ mostrar los turnos en orden indicando `(libre)` si esta vacio.\n\n**Resumen general:** turnos ocupados y disponibles por dia, dia con mas turnos o empate.\n\n**RESTRICCION ABSOLUTA:** NO listas, NO\
    \ diccionarios, NO sets, NO tuplas. Solo variables individuales nominadas. Validaciones con `.isalpha()` y `.isdigit()` en `while`, sin `try/except`.\n"
  inicial_codigo: '# Inicializacion de los siete slots como variables individuales

    lunes1 = ''''

    lunes2 = ''''

    lunes3 = ''''

    lunes4 = ''''

    martes1 = ''''

    martes2 = ''''

    martes3 = ''''

    '
  unidad_tematica: mixtos
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - while
    - input
    - print
    - isalpha
    - isdigit
    - len
    - and
    - or
    - not
    conceptuales:
    - representacion de estado con variables individuales nominadas
    - cascada if-elif para busqueda lineal sin iterable
    - verificacion de no repetido con or enumerativo de comparaciones
    - acumuladores manuales sin for sobre coleccion
    - menu repetitivo con condicion de salida
    - comprension de por que el or de Python no distribuye sobre la comparacion
  test_cases:
  - id: t1
    name: Reservar cuatro pacientes en lunes, quinto rechazado por cupo lleno
    type: stdin_stdout
    code: ''
    expected: Pacientes 1-4 se asignan a lunes1-lunes4 en orden; quinto intento muestra cupo lleno
    is_public: true
    weight: 2
  - id: t2
    name: Reservar, cancelar primero, volver a reservar en el espacio liberado
    type: stdin_stdout
    code: ''
    expected: Cancelar lunes1 lo deja vacio; nuevo paciente entra en lunes1 (primer libre), no en lunes3
    is_public: true
    weight: 2
  - id: t3
    name: 'Verificacion de no repetido: mismo nombre rechazado en el mismo dia'
    type: stdin_stdout
    code: ''
    expected: Intentar reservar 'Pedro' dos veces en lunes falla la segunda vez
    is_public: true
    weight: 1
  - id: t4
    name: Cancelar nombre inexistente da aviso sin modificar slots
    type: stdin_stdout
    code: ''
    expected: Cancelar 'Fantasma' que no esta reservado muestra paciente no encontrado; slots sin cambio
    is_public: false
    weight: 1
  - id: t5
    name: 'Resumen general con todos los casos: mas lunes, mas martes, empate'
    type: stdin_stdout
    code: ''
    expected: Tres escenarios distintos producen los mensajes correctos de comparacion
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Inicializacion correcta de los 7 slots con cadena vacia
      descripcion: Las siete variables (lunes1-lunes4, martes1-martes3) se inicializan con '' antes del menu
      puntaje_max: 1.0
    - nombre: Verificacion de no repetido con or enumerativo correcto
      descripcion: 'La comparacion es nombre == lunes1 or nombre == lunes2 or ... (no: nombre == lunes1 or lunes2 or ...)'
      puntaje_max: 2.0
    - nombre: Cascada if-elif para primer espacio libre en orden
      descripcion: La cascada revisa lunes1 primero; el else cubre cupo lleno; el orden es secuencial 1-4
      puntaje_max: 2.0
    - nombre: Cancelacion por nombre con cascada y else de no encontrado
      descripcion: La cascada de cancelacion asigna '' al slot que coincide; el else avisa paciente no encontrado
      puntaje_max: 1.5
    - nombre: Agenda, resumen y comparacion de dias correctos
      descripcion: La agenda muestra cada slot con su nombre o (libre); el resumen cuenta ocupados correctamente con if individuales
      puntaje_max: 1.5
    - nombre: Ausencia total de listas, dicts, sets y tuplas
      descripcion: El codigo no contiene [], {}, set() ni () usados como colecciones de datos
      puntaje_max: 2.0
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: 'El enunciado prohibe listas, diccionarios, sets y tuplas explicitamente. Si el alumno pide usar listas, el tutor responde: ''El enunciado prohibe listas. Resolvelo con variables
      nominadas. Que herramientas del lenguaje tenes para representar varios datos sin lista?'' NO debatir el enunciado, cumplirlo. Si el alumno argumenta que seria mas prolijo o que ya sabe hacerlo con
      listas, recontextualizar: el TP evalua especificamente la habilidad de operar sin estructuras de datos compuestas; si lo entrega con listas, no demuestra lo que el TP pide. La discusion sobre por
      que se prohibe se reserva para la fase 5 de generalizacion.

      '
  banco_preguntas:
    n1:
    - texto: El enunciado prohibe explicitamente listas, diccionarios, sets y tuplas. Como representas cuatro turnos de lunes sin ninguna de esas estructuras?
      senal_comprension: El estudiante razona que necesita cuatro variables individuales (lunes1, lunes2, lunes3, lunes4) y tres para martes. Cada variable guarda el nombre del paciente o una cadena vacia
        si esta libre.
      senal_alerta: 'El estudiante pide razon para la prohibicion; responder operativamente: el enunciado lo dice, vamos a cumplirlo, despues en fase 5 discutimos por que.'
    - texto: Si lunes2 contiene un nombre y lunes3 esta vacio, cual es el primer espacio libre del lunes? Como lo decidis sin recorrer una lista?
      senal_comprension: 'El estudiante razona que necesita comparar cada slot en orden con una cascada de if-elif: si lunes1 == cadena vacia, entonces lunes1 es el primer libre; si no, ver lunes2; y asi.'
      senal_alerta: El estudiante propone una funcion con un for sobre algo iterable; recordar que no hay iterable disponible.
    - texto: Que significa exactamente verificar que el nombre no este repetido en ese dia? Hace el caso del lunes con cuatro slots paso a paso.
      senal_comprension: El estudiante razona que verificar repetido implica comparar el nombre ingresado contra cada uno de los cuatro slots del lunes con or, y si alguno coincide, rechazar la reserva.
      senal_alerta: 'El estudiante escribe nombre == lunes1 or lunes2 or lunes3 or lunes4; preguntar: proba imprimir ''Camila'' == ''Ana'' or ''Marcos''. Que te da?'
    n2:
    - texto: Para mostrar la agenda del dia, el enunciado pide mostrar los turnos en orden indicando (libre) si esta vacio. Como armas eso sin un for?
      senal_comprension: El estudiante razona que necesita cuatro prints (para lunes) o tres (para martes) cada uno con un if-else interno que decide si imprimir el nombre o (libre).
      senal_alerta: El estudiante propone una funcion auxiliar mostrar_slot; admitir si el TP no lo restringe, pero notar que la repeticion esencial sigue siendo cuatro llamadas.
    - texto: Para el resumen general, como contas los turnos ocupados de cada dia sin un for?
      senal_comprension: El estudiante razona que necesita un contador inicializado en cero y cuatro if separados (uno por slot) que incrementan el contador si el slot no es vacio.
      senal_alerta: El estudiante propone len() sobre algo; recordar que no hay lista, por lo tanto no hay len() aplicable sobre coleccion.
    - texto: Para el dia con mas turnos o empate, que tres casos posibles tenes y como los distinguis?
      senal_comprension: 'El estudiante razona tres casos: ocupados_lunes mayor que ocupados_martes, ocupados_martes mayor que ocupados_lunes, ambos iguales (empate). Usa if-elif-else para distinguir.'
      senal_alerta: 'El estudiante solo plantea dos casos (mayor y menor) olvidando el empate; preguntar: y si tienen exactamente los mismos ocupados?'
    n3:
    - texto: Reserva secuencialmente cuatro pacientes en lunes con nombres distintos. Se llenan en orden? Despues intenta reservar un quinto. Tu programa muestra cupo lleno?
      senal_comprension: El estudiante prueba y verifica que el cuarto entra en lunes4 y el quinto recibe mensaje de cupo lleno.
      senal_alerta: El quinto entra en un slot que estaba 'ocupado' o no aparece el mensaje de cupo lleno; revisar si el else de la cascada esta presente.
    - texto: Reserva dos pacientes, cancela al primero y reserva un tercero. En que slot queda el tercero?
      senal_comprension: 'El estudiante razona y verifica: cancelar al primero deja lunes1 vacio y lunes2 ocupado; reservar nuevo busca primer libre y encuentra lunes1 vacio, asi que el tercero entra en
        lunes1.'
      senal_alerta: El estudiante esperaba que el tercero entre en lunes3; aprovechar para discutir la diferencia entre primer espacio libre y siguiente turno.
    - texto: Proba reservar dos veces el mismo nombre en lunes. Tu validacion lo rechaza la segunda vez?
      senal_comprension: El estudiante prueba y verifica que la verificacion de repetido lo detecta correctamente.
      senal_alerta: El duplicado se acepta; el or enumerativo esta mal escrito; revisar con la prueba 'Camila' == 'Ana' or 'Marcos'.
    n4:
    - texto: Si el TP permitiera listas, como se simplificaria el programa? Pensa en al menos tres partes que cambiarian.
      senal_comprension: 'El estudiante razona: (1) los slots serian una lista de strings, (2) la verificacion de repetido seria nombre in lista, (3) la busqueda de primer libre seria un for con index.
        La complejidad cae de O(N) lineas a O(1) lineas.'
      senal_alerta: El estudiante no puede identificar las partes concretas que cambiarian; senalar que empiece por la verificacion de repetido.
    - texto: Por que pensas que el enunciado prohibe listas explicitamente? Que habilidad cognitiva se entrena al hacerlo sin ellas?
      senal_comprension: El estudiante razona que la prohibicion fuerza a explicitar la estructura repetitiva mediante codigo, lo cual entrena la practica de cascadas if-elif con variables nominadas y consolida
        la comprension de que hace una lista internamente.
      senal_alerta: 'El estudiante dice que es un capricho o que no tiene sentido; llevar a la reflexion meta-cognitiva: que aprendiste que no hubieras aprendido si usabas lista?'
    - texto: Si los dias fueran 5 (lunes a viernes) en lugar de 2 y los cupos variaran por dia, como escala el codigo? Sigue siendo viable sin listas?
      senal_comprension: El estudiante razona que sin listas el codigo escala linealmente (mas variables, mas cascadas) hasta volverse inmanejable. La prohibicion de listas es pedagogica solo en el rango
        pequeno del ejercicio.
      senal_alerta: El estudiante dice que si es viable; pedirle que estime cuantas lineas tendria el E3 con 5 dias de 10 cupos cada uno.
  misconceptions:
  - descripcion: 'or de Python no distribuye sobre la comparacion: nombre == lunes1 or lunes2 se evalua como (nombre==lunes1) or lunes2, y lunes2 no-vacio es truthy siempre'
    probabilidad_estimada: 0.65
    pregunta_diagnostica: 'Proba en el interprete: ''Camila'' == ''Ana'' or ''Marcos''. Que te da? Esperabas ese resultado?'
  - descripcion: Solicitar permiso al tutor para usar lista argumentando que seria mas prolijo (manipulacion argumentada del contrato)
    probabilidad_estimada: 0.45
    pregunta_diagnostica: 'No es una misconception tecnica; la respuesta operativa es: el enunciado lo dice, lo cumplimos, en fase 5 discutimos por que.'
  - descripcion: Intentar iterar sobre variables individuales con un for, lo cual no funciona en Python sin estructura de datos
    probabilidad_estimada: 0.4
    pregunta_diagnostica: Muestra el for que escribiste. Que es lo iterable ahi? Que devuelve Python si lo ejecutas?
  - descripcion: Verificar repetidos comparando solo contra una variable en lugar de contra todas las del dia
    probabilidad_estimada: 0.35
    pregunta_diagnostica: Si lunes1 tiene 'Ana' y lunes2 tiene 'Pedro', y el nuevo nombre es 'Pedro', tu validacion lo detecta?
  - descripcion: Confundir primer espacio libre (primer slot con cadena vacia) con primer espacio (siempre lunes1 independiente del estado)
    probabilidad_estimada: 0.4
    pregunta_diagnostica: Si lunes1 esta ocupado pero lunes2 esta libre y reservas, en que slot queda el nuevo paciente?
  - descripcion: Inicializar con None en lugar de cadena vacia, lo que rompe la comparacion == '' mas adelante
    probabilidad_estimada: 0.25
    pregunta_diagnostica: Que valor les das a los slots al inicio? Proba None == '' en el interprete. Que da?
  respuesta_pista:
  - nivel: 1
    pista: 'Antes de pedirme como guardar los turnos, contame: cuantos turnos hay en total y que nombre le pones a cada uno?'
  - nivel: 2
    pista: Si te trabaste con la busqueda de primer libre, contame en espanol que tendria que hacer el programa cuando lunes1 esta ocupado pero lunes2 esta libre.
  - nivel: 3
    pista: La verificacion de repetido es la misma estructura para lunes que para martes. Una vez que armas una, que te queda por hacer para la otra?
  - nivel: 4
    pista: Probaste tu cancelacion? Si cancelas y vuelves a reservar, en que slot queda el nuevo? Probalo y contame.
  heuristica_cierre:
    tests_min_pasados: 3
    heuristica: Cerrar cuando el estudiante (a) prueba el ciclo completo de llenar lunes, cancelar uno, agregar uno nuevo verificando que entra en el espacio liberado; (b) prueba el caso de cupo lleno;
      (c) prueba la verificacion de repetidos; (d) prueba el resumen general con todos los casos (mas lunes, mas martes, empate); (e) responde la fase 5 sobre por que se prohibe listas. La prohibicion de
      listas debe quedar verbalizada como decision pedagogica del enunciado, no como capricho.
  anti_patrones:
  - patron: Validar transgresion del enunciado aceptando lista 'chica' o 'de siete elementos nomas'
    descripcion: El tutor acepta o no rechaza explicitamente el uso de una lista de 7 elementos argumentando que es equivalente; esto transgrede la restriccion del enunciado y elimina la zona didactica
      especifica del E3
    mensaje_orientacion: 'El enunciado prohibe listas. La discusion sobre si la prohibicion es util se reserva para la fase 5. Ahora: como lo resolvemos con variables nominadas?'
  - patron: Entregar la cascada if-elif completa de busqueda de primer libre sin que el estudiante la construya
