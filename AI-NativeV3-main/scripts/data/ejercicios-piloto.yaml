    tests_min_pasados: 2
    heuristica: Cerrar cuando el estudiante (a) prueba con al menos el caso del enunciado y dos casos limite del validador, (b) verbaliza la diferencia entre validacion del nombre con isalpha y validacion
      de la cantidad con isdigit mas condicion adicional, (c) responde al menos dos de las tres preguntas de fase 5. Si el estudiante cae en la misconception de acumulador no inicializado durante la construccion,
