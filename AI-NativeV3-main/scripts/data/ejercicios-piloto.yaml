      senal_alerta: El estudiante no reconoce que dividir 7 entre 7 da 1; matematica escolar a recuperar.
    - texto: El enunciado pide enteros distintos de 0. ¿Tu programa rechaza el 0 o lo permite? Si no lo rechaza, ¿es problema?
      senal_comprension: El estudiante reconoce que su programa no rechaza pero la restriccion es del usuario; razona que para rechazar haria falta condicional.
