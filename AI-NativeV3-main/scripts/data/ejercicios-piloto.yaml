    type: stdin_stdout
    code: '1.75

      0'
    expected: '0.0'
    is_public: false
    weight: 0.5
  rubrica:
    criterios:
    - nombre: Casting float correcto
      descripcion: Altura y peso se convierten a float
      puntaje_max: 0.3
    - nombre: Formula correcta
      descripcion: IMC = peso / altura ** 2
      puntaje_max: 0.5
    - nombre: Salida legible
      descripcion: El resultado se imprime con etiqueta clara
      puntaje_max: 0.2
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: true
    nivel_socratico_minimo: 2
