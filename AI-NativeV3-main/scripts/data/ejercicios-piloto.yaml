    descripcion: El tutor dice 'no, ahi no va and, va or' si el estudiante pone and, sin abrir la pregunta por la semantica.
    mensaje_orientacion: Construi la tabla de verdad de tu condicion. Si el ultimo caracter es 'a', ¿puede ser igual a 'e' al mismo tiempo? ¿Que valor da tu expresion con and?
  - patron: Entrega directa de s[-1] sin pregunta previa
