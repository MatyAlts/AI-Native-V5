    pregunta_diagnostica: Si el usuario ingresa 'abc' como precio del segundo producto, tu programa que hace?
  - descripcion: 'isdigit() funciona sobre int: despues de cantidad = int(input(...)), el estudiante intenta cantidad.isdigit() en una segunda comprobacion'
