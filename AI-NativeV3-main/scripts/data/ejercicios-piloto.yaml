  - nivel: 2
    pista: Si te trabaste con la validacion del nombre, contame en lengua natural cuando tu while deberia seguir y cuando deberia cortar.
  - nivel: 3
    pista: Probaste con el caso del ejemplo del enunciado (Ana con 3 productos)? Si te da distinto, en que numero difiere?
  - nivel: 4
