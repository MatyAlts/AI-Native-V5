- titulo: E8 — Indice de masa corporal (IMC)
  enunciado_md: 'Crear un programa que pida al usuario su altura y su peso e imprima por

    pantalla su indice de masa corporal.


    Formula: **IMC = peso(kg) / altura(m)²**


    *Vinculo con material de catedra*: Primer ejercicio con potencia `**`

    (apunte 4.1 y Actividad II seccion 2). Primer ejercicio con relevancia medica

    donde conviene introducir la responsabilidad etica del programador: el calculo

    es trivial, las consecuencias culturales del IMC como indicador son discutibles.

    '
  inicial_codigo: 'altura = float(input("Ingrese su altura en metros (ej: 1.75): "))

    peso   = float(input("Ingrese su peso en kg: "))

    imc    = ...

    print(...)

    '
  unidad_tematica: secuenciales
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - print
    - input
    - float()
    - '**'
    - operadores aritmeticos
    conceptuales:
    - casting a float
    - formulas con potencia
    - unidades de medida
    - responsabilidad del programador
  test_cases:
  - id: t1
    name: caso tipico 70kg 1.75m
    type: stdin_stdout
    code: '1.75

      70'
    expected: '22.86'
    is_public: true
    weight: 1
  - id: t2
    name: altura 0 — division por cero
    type: stdin_stdout
    code: '0

      70'
    expected: ZeroDivisionError
    is_public: false
    weight: 0.5
  - id: t3
