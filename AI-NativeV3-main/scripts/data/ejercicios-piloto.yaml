- titulo: 'E5 — Escape Room: Arena del Gladiador'
  enunciado_md: 'Simulador de batalla por turnos: el Gladiador (jugador) enfrenta al Enemigo (computadora) hasta reducir su HP a cero antes de caer el mismo.


    **Tipos de datos obligatorios:** string (nombre), int (HP y pociones), float (calculo del critico), boolean (control de turno y juego activo).


    **Variables iniciales (NO pedir al usuario):**

    - `vida_gladiador = 100`, `vida_enemigo = 100`, `pociones = 3`

    - `dano_base = 15`, `dano_enemigo = 12`, `turno_gladiador = True`


    **Validaciones:** nombre con `.isalpha()` en `while`; opciones del menu con `.isdigit()` en `while` con rango 1 a 3; sin `try/except`.


    **Ciclo:** mientras ambos HP > 0.


    **Menu (3 opciones):**


    1. **Ataque Pesado:** si `vida_enemigo < 20` es golpe critico (multiplica `dano_base * 1.5` dando `float`); sino usa `dano_base` normal; resta el dano al enemigo.

    2. **Rafaga Veloz:** bucle `for` que se repite 3 veces con `range`; en cada repeticion resta 5 puntos y muestra `Golpe conectado por 5 de dano`.

    3. **Curar:** si `pociones > 0` suma 30 a vida del jugador y resta 1 pocion; si no quedan pociones muestra `No quedan pociones` y pierde el turno (el enemigo ataca igual).


    **Tras cada accion del jugador:** el enemigo contraataca restando 12 a la vida del jugador.


    **Cierre:** si `vida_gladiador > 0` victoria; si `vida_gladiador <= 0` derrota.

    '
  inicial_codigo: "nombre = ''\nwhile not nombre.isalpha():\n    nombre = input(\"Ingresa el nombre de tu Gladiador (solo letras): \")\n\nvida_gladiador = 100\nvida_enemigo = 100\npociones = 3\ndano_base\
    \ = 15\ndano_enemigo = 12\nturno_gladiador = True\n"
  unidad_tematica: mixtos
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - while
    - for
    - range
    - input
    - print
    - isalpha
    - isdigit
    - bool
    - float
    - int
    - and
    - or
    - not
    conceptuales:
    - condicion de while con dos variables de estado (and entre ambas)
    - tipo float como resultado de multiplicacion con literal decimal
    - boolean como variable de control declarativa
    - for con range fijo de 3 iteraciones para accion repetida
    - ataque del enemigo siempre ejecutado independiente del exito de la accion del jugador
    - critico evaluado con vida del enemigo ANTES del ataque
