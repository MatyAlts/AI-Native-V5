      senal_comprension: Reconoce que las acentuadas no estan en 'aeiou' y toma una decision de alcance justificada.
      senal_alerta: Asume que si sin verificar.
    - texto: Si el chatbot te dice que la mejor solucion usa regex, ¿la entendes o la rechazas por innecesariamente compleja para este nivel?
      senal_comprension: Evalua que regex es excesivo para verificar 5 vocales y prefiere in o or.
      senal_alerta: Acepta regex porque 'suena mas profesional'.
