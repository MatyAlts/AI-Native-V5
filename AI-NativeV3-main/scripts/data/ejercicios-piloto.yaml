      senal_comprension: Reconoce que mes 13 no entra en ninguna condicion; decide si agregar else con mensaje de error o no.
      senal_alerta: No habia pensado en ese caso.
    n4:
    - texto: Si el chatbot te ofrece una version con un diccionario que mapea rangos a estaciones, ¿la elegirias o preferis la version con condicionales? ¿Por que?
      senal_comprension: Evalua ambas opciones; justifica que condicionales es lo pedido por el TP y mas legible para este nivel.
      senal_alerta: Elige la del chatbot sin entenderla.
    - texto: ¿Como decidirías si tu programa esta listo para enviarse al docente? ¿Cuantos casos de prueba ejecutarias como minimo?
      senal_comprension: Propone al menos un caso por estacion por hemisferio (8) mas umbrales (4) = 12 casos minimos.
      senal_alerta: Dice 'con 3 o 4 casos alcanza' sin justificar.
  misconceptions:
  - descripcion: 'M4: Confusion or excluyente en la condicion que cruza diciembre-marzo: el estudiante asume que solo una parte del or puede ser verdadera a la vez (correcto, pero no entiende por que se
      necesita or).'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: La estacion va del 21/12 al 20/3. ¿Puede el mes ser 12 Y 1 Y 2 al mismo tiempo? No. Pero la fecha puede ser EN el mes 12, O en el 1, O en el 2, O en el 3 (antes del 21). ¿Que operador
      usas cuando una sola de varias alternativas puede ser verdadera?
  - descripcion: 'M9: Else interno en condicional anidada confundido con else externo: el else del if de fecha se ejecuta para hemisferio opuesto.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Tu else esta dentro de que if exactamente, el de hemisferio o el de fecha? Si ingreso hemisferio sur y fecha valida, ¿que rama se ejecuta?
  - descripcion: 'M8: Anidamiento innecesariamente profundo donde and bastaria.'
    probabilidad_estimada: 0.4
    pregunta_diagnostica: Si yo quiero que se ejecute la linea cuando se cumplen las dos condiciones a la vez y no en ningun otro caso, ¿con que operador logico expresarias eso en lugar de anidar?
  - descripcion: 'M2: Lectura del 21 inclusive y del 20 inclusive: el estudiante duda sobre a que estacion pertenece el dia de cambio.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: El dia 21 de diciembre, ¿pertenece al rango que termina el 20 de diciembre o al rango que arranca el 21 de diciembre? La convencion calendario dice que el dia de apertura pertenece
      al rango que arranca.
  respuesta_pista:
  - nivel: 1
    pista: 'Estructura recomendada: if hemisferio == ''N'' ... else (hemisferio == ''S''). Dentro de cada rama tenes cuatro condicionales para las cuatro estaciones del hemisferio. La condicion que cruza
      diciembre-marzo se escribe con or: (mes == 12 and dia >= 21) or (mes <= 2) or (mes == 3 and dia <= 20). Te dejo esa condicion para hemisferio norte (invierno). ¿Como la escribis para hemisferio sur
      (verano)?'
  - nivel: 2
    pista: 'Para el hemisferio norte: Invierno es (mes == 12 and dia >= 21) or (mes == 1) or (mes == 2) or (mes == 3 and dia <= 20). Las otras tres estaciones tienen rangos que no cruzan el fin de ano y
      son mas simples de escribir.'
  - nivel: 3
    pista: "# Estructura base (hemisfero norte):\nif hemi == \"N\":\n    p_invierno = (mes == 12 and dia >= 21) or (mes == 1) or (mes == 2) or (mes == 3 and dia <= 20)\n    p_primavera = (mes == 3 and dia\
      \ >= 21) or (mes == 4) or (mes == 5) or (mes == 6 and dia <= 20)\n    p_verano = (mes == 6 and dia >= 21) or (mes == 7) or (mes == 8) or (mes == 9 and dia <= 20)\n    p_otono = (mes == 9 and dia >=\
      \ 21) or (mes == 10) or (mes == 11) or (mes == 12 and dia <= 20)\n    if p_primavera:\n        print(\"Primavera\")\n    elif p_verano:\n        print(\"Verano\")\n    elif p_otono:\n        print(\"\
      Otono\")\n    else:\n        print(\"Invierno\")\nelse:  # hemisferio S — estaciones opuestas\n    # mismo patron, nombres invertidos\n"
  - nivel: 4
    pista: 'La clave DRY: calculá los cuatro periodos como variables booleanas antes del condicional. Asi la condicion larga se escribe una vez y los if internos son limpios.'
  heuristica_cierre:
    tests_min_pasados: 6
    heuristica: El tutor puede cerrar cuando el estudiante haya probado al menos un caso por estacion por hemisferio (8 casos), los umbrales exactos de cambio de estacion (al menos 4), y la condicion del
