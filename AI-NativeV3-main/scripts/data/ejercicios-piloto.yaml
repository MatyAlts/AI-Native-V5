    n2:
    - texto: ¿Que estructura agregas respecto del E1 para cubrir el caso de la nota menor a 6?
      senal_comprension: Identifica que necesita un else y lo distingue de un segundo if.
      senal_alerta: Propone un segundo if en lugar de else (M5 incipiente).
    - texto: ¿Podrias resolver este ejercicio sin else, usando dos if separados? ¿Funcionaria igual? ¿Seria mas claro o menos claro?
      senal_comprension: Reconoce que dos if pueden producir doble impresion si las condiciones no son perfectamente complementarias, y que if-else es mas seguro y legible.
      senal_alerta: Dice 'si, funcionaria igual' sin analizar el caso borde donde se cambia el umbral.
    n3:
    - texto: ¿Probaste con nota exactamente 6? ¿Aprobado o desaprobado?
      senal_comprension: Ejecuta y verifica que 6 da 'Aprobado' (umbral inclusive).
      senal_alerta: No probo el umbral o reporta resultado incorrecto.
    - texto: ¿Probaste con nota 5.9? ¿Y con nota 6.1?
      senal_comprension: Reporta 5.9 desaprobado, 6.1 aprobado.
      senal_alerta: Solo probo valores enteros, no decimales cerca del umbral.
    n4:
    - texto: ¿Hay algun caso en el que tu programa imprima dos mensajes a la vez? ¿Como lo sabes?
      senal_comprension: Razona que con if-else es imposible que se ejecuten las dos ramas; con dos if seria posible si las condiciones no son complementarias.
      senal_alerta: Responde 'no' sin justificar estructuralmente.
    - texto: Si tuvieras que explicarle a un companero por que usas else y no un segundo if, ¿que le dirias?
      senal_comprension: Menciona mantenibilidad (si cambias el umbral, cambia en un solo lugar) y exclusion mutua garantizada.
      senal_alerta: Responde 'porque es mas corto' sin argumentar exclusion mutua.
  misconceptions:
  - descripcion: 'M5: Dos if separados en vez de if-else: el estudiante escribe dos condiciones independientes donde deberia haber una estructura if-else.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Si yo tengo varios if separados y dos condiciones son verdaderas al mismo tiempo, ¿cuantas veces se ejecuta la salida? ¿Es lo que queres?
  - descripcion: 'M2: Confusion sobre >= versus > para el umbral 6: el estudiante usa > 6 en lugar de >= 6.'
    probabilidad_estimada: 0.35
    pregunta_diagnostica: El enunciado dice 'mayor o igual a 6'. Si alguien saco exactamente 6, ¿aprobo o desaprobo?
  - descripcion: 'M1: Escritura if nota = 6 en vez de == durante la primera formalización.'
    probabilidad_estimada: 0.4
    pregunta_diagnostica: Si escribis if nota = 6:, ¿que queres que Python haga? Probalo y mira el mensaje de error.
  respuesta_pista:
  - nivel: 1
    pista: La estructura es if-else, te lo confirmo. Lo que tenes que decidir es la condicion del if. ¿Es nota >= 6 o nota > 6? Pensa que dice el enunciado exactamente y elegi.
  - nivel: 2
    pista: El enunciado dice 'mayor o igual a 6', entonces el operador es >=. La condicion del if es nota >= 6. El else cubre todo lo demas (nota < 6). ¿Que imprime cada rama?
  - nivel: 3
    pista: 'if nota >= 6: → print(''Aprobado''). else: → print(''Desaprobado''). Fijate que el else no tiene condicion; Python lo ejecuta si el if fue falso.'
  - nivel: 4
    pista: "nota = float(input(\"Tu nota: \"))\nif nota >= 6:\n    print(\"Aprobado\")\nelse:\n    print(\"Desaprobado\")\n"
  heuristica_cierre:
    tests_min_pasados: 4
    heuristica: El tutor puede cerrar cuando el estudiante use if-else (no dos if), haya probado el umbral exacto (nota = 6) y dos casos decimales cercanos, y pueda justificar la diferencia entre >= y >.
  anti_patrones:
  - patron: Validacion delegada al tutor
    descripcion: El tutor dice 'si, esta bien' despues de mirar el codigo sin que el estudiante lo haya ejecutado.
    mensaje_orientacion: Para. Antes de que yo te diga si esta bien o mal, ¿lo corriste? ¿Que pasa cuando ingresas 5.99? ¿Y cuando ingresas 6.01?
  - patron: Dictado de la diferencia >= vs >
    descripcion: El tutor dice directamente 'usa >=, no >' sin abrir la pregunta por la semantica del enunciado.
    mensaje_orientacion: 'El enunciado dice ''mayor o igual a 6''. Si alguien saco exactamente 6, ¿aprobo o desaprobo? Ahora: ¿que operador captura ese caso?'
  - patron: Cierre prematuro del episodio
    descripcion: El tutor cierra sin que el estudiante haya probado el umbral exacto ni producido reflexion sobre if-else vs dos if.
    mensaje_orientacion: 'Antes de cerrar: ¿probaste con 5.99 y 6.01? ¿Y con exactamente 6? ¿Tu programa imprime el mensaje correcto en los tres casos?'
- titulo: E3 — Validacion de numero par
  enunciado_md: 'Escribir un programa que permita ingresar solo numeros pares.

    Si el usuario ingresa un numero par, imprimir por pantalla el mensaje «Ha ingresado un numero par»;

    en caso contrario, imprimir por pantalla «Por favor, ingrese un numero par».

    Nota: investigar el uso del operador de modulo (%) en Python.

    '
  inicial_codigo: 'n = int(input("Ingresa un numero: "))

    # Tu codigo aqui (pista: investiga el operador %)

    '
  unidad_tematica: condicionales
  dificultad: basica
  prerequisitos:
    sintacticos:
    - if
    - else
    - input
    - int
    - '%'
    conceptuales:
    - paridad como divisibilidad por 2
    - operador modulo
    - if-else consolidado de E2
  test_cases:
  - id: t1
    name: numero par positivo
    type: stdin_stdout
    code: '4

      '
    expected: Ha ingresado un numero par
    is_public: true
    weight: 1
  - id: t2
    name: numero impar positivo
    type: stdin_stdout
    code: '7

      '
    expected: Por favor, ingrese un numero par
    is_public: true
    weight: 1
  - id: t3
    name: cero (caso borde — es par)
    type: stdin_stdout
    code: '0

      '
    expected: Ha ingresado un numero par
    is_public: false
    weight: 1
  - id: t4
    name: numero par negativo
    type: stdin_stdout
    code: '-6

      '
    expected: Ha ingresado un numero par
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Uso correcto del operador modulo
      descripcion: La condicion usa n % 2 == 0 (no n % 2 == 1 para par).
      puntaje_max: 0.5
    - nombre: Cobertura de casos borde
      descripcion: El estudiante probo con 0 y con un negativo par.
      puntaje_max: 0.5
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: true
    nivel_socratico_minimo: 2
    instrucciones_adicionales: El operador % es nuevo. El tutor debe guiar al estudiante a descubrirlo empiricamente antes de explicarlo.
  banco_preguntas:
    n1:
    - texto: ¿Que significa que un numero sea par en matematica?
      senal_comprension: Responde que es divisible por 2 sin resto, o equivalente.
      senal_alerta: Confunde par con positivo (M10) o no recuerda la definicion.
    - texto: ¿El cero es par?
      senal_comprension: Responde que si y lo justifica (0 dividido 2 da resto 0).
      senal_alerta: Duda o responde que no por intuicion.
    - texto: ¿Como le podrias preguntar a Python cual es el resto de dividir un numero por 2?
      senal_comprension: Investiga o intuye que existe un operador especifico y pregunta cual es.
      senal_alerta: Propone usar division comun y restarle el cociente entero (estrategia compleja innecesaria).
    n2:
    - texto: Si el resto de n dividido 2 es 0, ¿n es par o impar?
      senal_comprension: 'Responde: par. Y conecta eso con la condicion n % 2 == 0.'
      senal_alerta: Confunde el resto con otro valor o propone n % 2 == 1 para par.
    - texto: ¿Que condicion exacta pondrias en tu if?
      senal_comprension: Escribe n % 2 == 0 con doble igual.
      senal_alerta: Escribe n % 2 = 0 (M1) o n % 2 == 1.
    - texto: Si tu condicion es n % 2 == 0, ¿que pasa con los numeros negativos pares? Probalo.
      senal_comprension: Ejecuta y verifica que -6 % 2 da 0 en Python y se clasifica correctamente como par.
      senal_alerta: Asume que los negativos no funcionan sin verificar.
    n3:
    - texto: Proba con 4, con 7, con 0, con -6, con 100, con -1. ¿Tu programa los clasifica correctamente?
      senal_comprension: Reporta todos los resultados correctamente incluyendo 0 y negativos.
      senal_alerta: Solo probo positivos o no probo 0.
    - texto: ¿Probaste con un numero decimal como 2.5? ¿Que hace tu programa?
      senal_comprension: Reconoce que int() no acepta decimales y toma una decision de alcance.
      senal_alerta: No habia pensado en ese caso y queda desconcertado.
    n4:
    - texto: Si le pedis al chatbot que te explique que hace n % 2, ¿que te devuelve? ¿Y por que eso te ayuda a determinar paridad?
      senal_comprension: Evalua criticamente la explicacion del chatbot y la conecta con la definicion matematica de paridad.
      senal_alerta: Copia la explicacion del chatbot sin verificar con casos concretos.
    - texto: ¿Hay otra forma de chequear paridad sin usar modulo? ¿Cual te parece mas clara para un lector humano?
      senal_comprension: Menciona division entera o bit de menor peso; justifica cual es mas legible.
      senal_alerta: Dice que no hay otra forma sin haberlo pensado.
  misconceptions:
  - descripcion: 'M11: Operador % confundido con porcentaje: el estudiante pregunta como calcula el ''tanto por ciento''.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: El simbolo % en Python no es porcentaje, es otra cosa. ¿Que te devuelve la expresion 10 % 3? Probala. ¿Y 12 % 4? ¿Que patron ves?
  - descripcion: 'M10: Paridad confundida con signo o positividad: el estudiante escribe if n > 0: print(''par'').'
    probabilidad_estimada: 0.3
    pregunta_diagnostica: ¿Que es un numero par exactamente? ¿Tres es par? ¿Cuatro es par? ¿Como lo decide la matematica?
  - descripcion: 'M1: Escritura n % 2 = 0 en vez de == durante la formalizacion.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Si escribis n % 2 = 0 en el if, ¿que error te da Python? ¿Que diferencia hay entre = y ==?
  respuesta_pista:
  - nivel: 1
    pista: 'El operador que necesitas se escribe % y se llama modulo. Proba en una celda nueva: 10 % 2, 7 % 2, 0 % 2. Observa que te devuelve y vas a ver el patron. ¿Que te devuelve 7 % 2?'
  - nivel: 2
    pista: 'El patron es: cuando n es par, n % 2 da 0. Cuando es impar, da 1. Entonces la condicion de tu if es n % 2 == 0 (con doble igual, porque es comparacion). ¿Cuál rama imprime ''par'' y cual ''impar''?'
  - nivel: 3
    pista: 'if n % 2 == 0: → print(''Ha ingresado un numero par''). else: → print(''Por favor, ingrese un numero par''). Proba con 4, 7, 0, -6 para verificar.'
  - nivel: 4
    pista: "n = int(input(\"Ingresa un numero: \"))\nif n % 2 == 0:\n    print(\"Ha ingresado un numero par\")\nelse:\n    print(\"Por favor, ingrese un numero par\")\n"
  heuristica_cierre:
    tests_min_pasados: 4
    heuristica: El tutor puede cerrar cuando el estudiante haya descubierto el patron de % por si mismo (no por dictado), haya probado al menos con 0 y un negativo par, y haya justificado el uso de == 0
      como condicion de paridad.
  anti_patrones:
  - patron: Validacion delegada al tutor
    descripcion: El tutor dice 'si, esta bien' sin que el estudiante haya ejecutado el codigo. Especialmente critico aqui porque el bug mas comun (n % 2 == 1 para par) pasa el ojo desnudo.
    mensaje_orientacion: Para. Antes de que yo te diga si esta bien o mal, ¿lo corriste? Proba con 4 y con 7 y contame que imprime.
  - patron: Entrega directa del operador % antes de que el estudiante lo busque
    descripcion: El tutor dice 'el operador es %' antes de que el estudiante haya intentado investigar. Corta la busqueda autonoma que el enunciado pide explicitamente.
    mensaje_orientacion: El enunciado dice 'investigar el uso del operador de modulo'. ¿Buscaste ya? ¿Que encontraste?
  - patron: Devoluccion correctiva sin pregunta
    descripcion: El tutor dice 'esta mal, eso no es par' si el estudiante confunde par con positivo, sin invitar a la definicion matematica.
    mensaje_orientacion: ¿Como definirías que un numero es par usando algo que ya conozcas de aritmetica? ¿Que operador de Python te da el resto de una division?
- titulo: E4 — Categorias de edad
  enunciado_md: 'Escribir un programa que solicite al usuario su edad e imprima por pantalla a cual de las

    siguientes categorias pertenece:

    - Nino/a (menor de 12)

    - Adolescente (mayor o igual que 12 y menor que 18)

    - Adulto/a joven (mayor o igual que 18 y menor que 30)

    - Adulto/a (mayor o igual que 30)

    '
  inicial_codigo: 'edad = int(input("Ingresa tu edad: "))

    # Tu codigo aqui (pista: vas a necesitar elif)

    '
  unidad_tematica: condicionales
  dificultad: intermedia
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - input
    - int
    conceptuales:
    - mutua exclusion entre rangos
    - encadenado if-elif-else
    - E1-E3 cerrados
  test_cases:
  - id: t1
    name: edad 11 — nino
    type: stdin_stdout
    code: '11

      '
    expected: Nino/a
    is_public: true
    weight: 1
  - id: t2
    name: edad 12 — adolescente (umbral inferior inclusive)
    type: stdin_stdout
    code: '12

      '
    expected: Adolescente
    is_public: true
    weight: 1
  - id: t3
    name: edad 18 — adulto joven (umbral inferior inclusive)
    type: stdin_stdout
    code: '18

      '
    expected: Adulto/a joven
    is_public: false
    weight: 1
  - id: t4
    name: edad 30 — adulto
    type: stdin_stdout
    code: '30

      '
    expected: Adulto/a
    is_public: false
    weight: 1
  - id: t5
    name: edad 100 — adulto
    type: stdin_stdout
    code: '100

      '
    expected: Adulto/a
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Uso de if-elif-else (no cuatro if separados)
      descripcion: La estructura es encadenada; no cuatro if independientes (M5).
      puntaje_max: 0.5
    - nombre: Umbrales correctos e inclusive segun enunciado
      descripcion: 12, 18 y 30 caen en la categoria correcta segun el enunciado.
      puntaje_max: 0.5
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: null
  banco_preguntas:
    n1:
    - texto: ¿Cuantas categorias tenes que distinguir?
      senal_comprension: Responde cuatro y las enumera.
      senal_alerta: Responde tres o cinco sin contar adecuadamente.
    - texto: Una persona de exactamente 12 anos, ¿es nino o adolescente segun el enunciado?
      senal_comprension: Lee 'adolescente' porque el enunciado dice 'mayor o igual que 12'.
      senal_alerta: Lee 'nino' aplicando M2 (lectura inclusive del 'menor de').
    - texto: Los rangos del enunciado, ¿se solapan en algun punto?
      senal_comprension: Verifica los cuatro umbrales y concluye que no hay solapamiento ni hueco.
      senal_alerta: No verifica explicitamente y asume que no.
    n2:
    - texto: ¿Que estructura sintactica usas para cuatro categorias mutuamente excluyentes?
      senal_comprension: Identifica if-elif-elif-else como la estructura adecuada.
      senal_alerta: Propone cuatro if separados (M5).
    - texto: Si en lugar de elif usas cuatro if separados, ¿cambia el comportamiento? ¿Probaste?
      senal_comprension: Puede demostrar un caso donde dos condiciones serian verdaderas simultaneamente si los limites se superponen, o argumenta que con elif la cadena garantiza exclusion.
      senal_alerta: Dice que funcionaria igual sin analizar casos.
    - texto: El ultimo caso, adulto/a, ¿lo escribis con un elif o con un else? ¿Cual preferis y por que?
      senal_comprension: 'Argumenta la decision: else es mas robusto porque captura todo lo que no entro antes; elif con condicion explicita documenta mejor el rango.'
      senal_alerta: Elige sin justificar.
    n3:
    - texto: Proba con edad 11, 12, 17, 18, 29, 30, 0, 100. ¿Cada caso entra en la categoria correcta?
      senal_comprension: Ejecuta todos los casos y reporta resultados correctos, especialmente en los umbrales 12, 18 y 30.
      senal_alerta: Solo probo valores medios (ej. 25) sin tocar umbrales.
    - texto: ¿Probaste con edad negativa? ¿Tu programa imprime algo razonable?
      senal_comprension: Reconoce que el enunciado no pide manejar negativos y toma una decision de alcance.
      senal_alerta: Queda desconcertado o agrega validacion de entrada que el TP no pide.
    n4:
    - texto: Si pedis al chatbot que reescriba tu programa usando condicionales anidados en vez de elif, ¿el resultado es mas legible o menos? Justifica.
      senal_comprension: Compara las dos versiones y argumenta que elif es mas plano y legible para categorias mutuamente excluyentes.
      senal_alerta: Acepta la version del chatbot sin compararla con la propia.
    - texto: ¿En que casos preferirías condicionales anidados a elif? ¿Y al reves?
      senal_comprension: Identifica que anidados son mejores cuando la segunda condicion depende de la primera; elif cuando las ramas son independientes y mutuamente excluyentes.
      senal_alerta: No puede distinguir los dos casos de uso.
  misconceptions:
  - descripcion: 'M5: if separados en vez de elif: el estudiante escribe cuatro if independientes para cuatro categorias mutuamente excluyentes.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Si yo tengo varios if separados y dos condiciones son verdaderas al mismo tiempo, ¿cuantas veces se ejecuta la salida? ¿Es lo que queres?
  - descripcion: 'M2: Lectura inclusive de los umbrales: el estudiante coloca la edad 12 en ''nino'' en vez de ''adolescente''.'
    probabilidad_estimada: 0.6
    pregunta_diagnostica: 'El enunciado dice ''adolescente: mayor o igual que 12 y menor que 18''. Si alguien tiene exactamente 12 anos, ¿de que categoria es segun esa frase?'
  - descripcion: 'M6: Else como cuarta categoria: el estudiante usa else para adulto/a sin notar que captura tambien edades negativas o invalidas.'
    probabilidad_estimada: 0.4
    pregunta_diagnostica: ¿Que casos exactamente cubre tu else? ¿Hay algun caso que no esperas que llegue ahi pero podria llegar? Proba con una entrada negativa.
  respuesta_pista:
  - nivel: 1
    pista: 'La estructura es if-elif-elif-else o si queres if-elif-elif-elif sin else. Esa es una decision tuya. Para cada rama tenes que escribir la condicion que define el rango. Te ayudo con la primera:
      nino es edad < 12. ¿Cual es la condicion de adolescente, escrita en codigo?'
  - nivel: 2
    pista: 'Adolescente: edad >= 12 (pero no hace falta escribirlo porque la cadena ya garantiza que si llego aca, edad >= 12). Solo necesitas: elif edad < 18: print(''Adolescente''). El limite inferior
      esta implícito. ¿Ves por que?'
  - nivel: 3
    pista: "if edad < 12:\n    print(\"Nino/a\")\nelif edad < 18:\n    print(\"Adolescente\")\nelif edad < 30:\n    print(\"Adulto/a joven\")\nelse:\n    print(\"Adulto/a\")\n"
  - nivel: 4
    pista: La clave es que en una cadena elif, si llego al segundo elif es porque el primer if fue falso. Entonces ya se que edad >= 12. No hace falta repetir el limite inferior.
  heuristica_cierre:
    tests_min_pasados: 5
    heuristica: El tutor puede cerrar cuando el estudiante use elif (no cuatro if), haya probado los tres umbrales (12, 18, 30) mas al menos un caso por categoria, y pueda explicar por que no necesita el
      limite inferior en cada elif.
  anti_patrones:
  - patron: Dictado de estructura sintactica antes de identificar casos
    descripcion: El tutor dice 'esto se resuelve con if-elif-else' antes de que el estudiante haya enumerado las cuatro categorias.
    mensaje_orientacion: ¿Cuantos casos tenes que distinguir segun el enunciado? ¿Esos casos se tocan en algun numero?
  - patron: Corrección directa de la lectura inclusive de umbrales
    descripcion: El tutor dice directamente 'el 12 es adolescente' sin abrir la pregunta.
    mensaje_orientacion: 'El enunciado dice ''adolescente: mayor o igual que 12''. Si alguien tiene exactamente 12 anos, ¿de que categoria es segun esa frase?'
  - patron: Cierre prematuro sin prueba de umbrales
    descripcion: El tutor cierra el episodio sin que el estudiante haya probado los valores exactos 12, 18 y 30.
    mensaje_orientacion: 'Antes de cerrar: ¿probaste con 11, 12, 17, 18, 29, 30? Esos son los umbrales; son los casos que mas importan.'
