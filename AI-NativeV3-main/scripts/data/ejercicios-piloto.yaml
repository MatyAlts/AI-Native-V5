    - texto: 'La opcion Curar tiene dos casos: con pociones disponibles y sin pociones. Que pasa en cada caso? En cuales de los dos casos ataca el enemigo despues?'
      senal_comprension: El estudiante razona que con pociones cura +30 y descuenta una pocion, y el enemigo ataca igual al cerrar el turno; sin pociones muestra el mensaje, pierde el turno y el enemigo
