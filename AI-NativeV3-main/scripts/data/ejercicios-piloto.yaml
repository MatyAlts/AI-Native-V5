    - texto: Para la condicion del while principal del juego, que variables y operadores combinas? Usas and, or, o una mezcla?
      senal_comprension: El estudiante razona while energia > 0 and tiempo > 0 and cerraduras_abiertas < 3 and not bloqueado. Todas las condiciones deben ser True para seguir.
      senal_alerta: 'El estudiante propone or; pedirle que pruebe mentalmente: si energia=0 y tiempo=100 cerraduras=0, el juego sigue? Con or si, lo cual viola el enunciado.'
    - texto: 'La regla anti-spam genera tres efectos: cobra costo, no abre cerradura, activa alarma. En que orden los aplicas y que pasa si te equivocas de orden?'
      senal_comprension: 'El estudiante razona: primero detectar si es la tercera consecutiva, despues aplicar costo y alarma sin incrementar cerradura. Si invierte el orden puede cobrar doble.'
      senal_alerta: 'El estudiante no ve el problema de orden; preguntar: si aplicas el costo de forzar normal ANTES de detectar la anti-spam, y despues la detectas y aplicas de nuevo, cuantas veces cobro?'
    n3:
    - texto: Mostrame la cascada de deteccion de la regla anti-spam dentro de la opcion 1 (forzar). Donde la pones respecto del incremento del contador?
      senal_comprension: El estudiante incrementa forzar_consecutivas y verifica si es igual a 3. Si lo es, aplica costo, activa alarma, no incrementa cerradura. Si es 1 o 2, aplica costo normal y avanza
        la cerradura.
      senal_alerta: El estudiante verifica antes de incrementar; al probar, la regla nunca llega a 3 porque compara con 3 antes de sumar.
    - texto: Para el for de 4 pasos del hackeo, que hace dentro del bucle y como verificas la apertura automatica al cruzar 8?
      senal_comprension: 'El estudiante razona: for paso in range(4): codigo_parcial += ''A''; imprimir progreso. Despues del for, if len(codigo_parcial) >= 8 and cerraduras_abiertas < 3: cerraduras_abiertas
        += 1.'
      senal_alerta: El estudiante intenta abrir la cerradura dentro del for; pedirle que piense cuantas iteraciones del for se hacen y cual es el len final esperado.
    - texto: Para descansar, como aplicas el cap de 100 a la energia? Usas un if despues de sumar o min() o una expresion?
      senal_comprension: 'El estudiante propone una de tres opciones: (1) sumar 15 e if energia > 100: energia = 100; (2) usar min(energia + 15, 100). Todas validas; elige una y justifica.'
      senal_alerta: 'El estudiante no aplica ningun cap; preguntar: que pasa si descansas con energia 95? Deberia quedar en 110?'
    n4:
