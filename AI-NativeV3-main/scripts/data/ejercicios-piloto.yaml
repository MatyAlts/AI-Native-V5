    tests_min_pasados: 4
    heuristica: El tutor puede cerrar cuando el estudiante haya probado casos con mayusculas (ej. 'HOLA'), la condicion maneje mayusculas correctamente (lower() o 'AEIOU' incluidas), y el estudiante haya
      tomado una decision de alcance sobre la cadena vacia.
  anti_patrones:
