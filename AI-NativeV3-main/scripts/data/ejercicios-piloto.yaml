- titulo: E9 — Conversion Celsius a Fahrenheit
  enunciado_md: 'Crear un programa que pida al usuario una temperatura en Celsius e imprima

    por pantalla su equivalente en Fahrenheit.


    Formula: **F = (9/5) × C + 32**


    *Vinculo con material de catedra*: Aritmetica simple con orden de operaciones

    implicito. La division 9/5 debe resolverse antes de multiplicar por C. Buena

    oportunidad para discutir parentesis explicitos versus confianza en precedencia.

    '
  inicial_codigo: 'celsius = float(input("Ingrese la temperatura en Celsius: "))

    fahrenheit = ...  # aplicar la formula

    print(...)

    '
  unidad_tematica: secuenciales
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - print
    - input
    - float()
    - operadores aritmeticos
    - parentesis
    conceptuales:
    - orden de operaciones
    - casting a float
    - escalas de temperatura
  test_cases:
  - id: t1
    name: 0 Celsius = 32 Fahrenheit
    type: stdin_stdout
    code: '0'
    expected: '32.0'
    is_public: true
    weight: 1
  - id: t2
    name: 100 Celsius = 212 Fahrenheit
    type: stdin_stdout
    code: '100'
    expected: '212.0'
    is_public: true
    weight: 1
  - id: t3
    name: -40 Celsius = -40 Fahrenheit
    type: stdin_stdout
    code: '-40'
    expected: '-40.0'
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Casting correcto
      descripcion: La temperatura se convierte a float
      puntaje_max: 0.3
    - nombre: Formula correcta
      descripcion: F = (9/5) * C + 32 o equivalente
      puntaje_max: 0.7
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: true
    nivel_socratico_minimo: 1
    instrucciones_adicionales: El caso -40 es el punto de coincidencia de las dos escalas; activarlo como descubrimiento para perfil reflexivo.
  banco_preguntas:
    n1:
    - texto: 'Decime sin mirar la formula: si la temperatura en Celsius es 0, ¿cuantos Fahrenheit son? ¿Y si son 100?'
      senal_comprension: El estudiante recuerda 32 y 212 o los calcula mentalmente.
      senal_alerta: El estudiante no los recuerda; pedirle que calcule con la formula antes de programar.
    - texto: ¿Esperas un resultado entero o con decimales para una entrada como 37 Celsius?
      senal_comprension: El estudiante anticipa decimal (98.6) y conecta con la temperatura corporal humana.
      senal_alerta: El estudiante anticipa entero; mostrar que la fraccion 9/5 introduce decimales.
    - texto: La temperatura puede ser negativa (dias de invierno). ¿Tu input necesita prever ese caso o lo maneja automaticamente?
      senal_comprension: El estudiante razona que float maneja negativos sin problema.
      senal_alerta: El estudiante propone agregar logica para negativos; mostrar que float ya los acepta.
    n2:
    - texto: La fraccion 9/5 en Python, ¿te conviene escribirla como 9/5 o como 1.8? ¿Las dos dan exactamente lo mismo? Probalo aparte.
      senal_comprension: El estudiante prueba y observa que 9/5 = 1.8 en Python 3.
      senal_alerta: El estudiante asume que dan lo mismo sin probar; pedirle la prueba.
    - texto: ¿Vas a usar int o float para la entrada del usuario? Si elegis int, ¿podrias ingresar 36.5?
      senal_comprension: El estudiante elige float y justifica con la posibilidad de temperaturas decimales.
      senal_alerta: El estudiante elige int y dice que esta bien; mostrar el problema con 36.5 truncado a 36.
    - texto: ¿Necesitas parentesis en la formula o el orden de precedencia de Python te resuelve el calculo? Proba las dos versiones.
      senal_comprension: El estudiante prueba con y sin parentesis explicitos y observa que en este caso son equivalentes pero los parentesis comunican intencion.
      senal_alerta: El estudiante usa parentesis sin saber si son necesarios; aceptar como buena practica pero discutir por que son innecesarios tecnicamente.
    n3:
    - texto: 'Caso 0 Celsius: ¿da 32 Fahrenheit? Caso 100 Celsius: ¿da 212 Fahrenheit?'
      senal_comprension: El estudiante confirma ambos casos y verifica que coinciden con su anticipacion de fase 1.
      senal_alerta: El estudiante obtiene valores distintos; redirigir a revisar la formula y el orden de operaciones.
    - texto: 'Caso -40 Celsius: ¿da -40 Fahrenheit? Este es un control matematico famoso.'
      senal_comprension: El estudiante confirma -40 = -40 y reconoce el punto de coincidencia entre las dos escalas.
      senal_alerta: El estudiante no habia escuchado este caso; aprovechar para mostrar que es informacion valiosa sobre las escalas.
    - texto: Proba con 37 Celsius (temperatura corporal). ¿Te da cerca de 98.6?
      senal_comprension: El estudiante observa 98.6 y conecta con el dato cultural conocido.
      senal_alerta: El estudiante no conoce 98.6; ofrecer el dato como referencia cultural.
    - texto: 'Pregunta hipotetica: ¿que pasa con -300 Celsius? Tu programa calcula sin chistar, pero fisicamente esa temperatura es imposible. ¿Es responsabilidad del programa avisar?'
      senal_comprension: El estudiante distingue entre validez tecnica y validez fisica.
      senal_alerta: El estudiante dice que si Python calcula esta bien; aceptar pero plantar la diferencia entre calculo y validacion.
    n4:
    - texto: Si tuvieras que escribir el programa inverso (Fahrenheit a Celsius), ¿que formula usarias? Despejarla de la que ya tenes.
      senal_comprension: El estudiante despeja C = (F - 32) × 5/9 y razona que el programa es estructuralmente identico cambiando la formula.
      senal_alerta: El estudiante no despeja; aceptar como ejercicio matematico pendiente.
    - texto: ¿Que valor de C hace que la formula de exactamente 0 en Fahrenheit? Calcularlosin Python.
      senal_comprension: El estudiante despeja -32 * 5/9 = -17.78 y luego lo confirma con el programa.
      senal_alerta: El estudiante no puede despejar; ofrecer la ecuacion C = -32 * 5/9 y pedirle el calculo.
  misconceptions:
  - descripcion: Las temperaturas negativas en Celsius dan error al convertir
    probabilidad_estimada: 0.25
    pregunta_diagnostica: ¿Crees que el programa va a fallar con -10 Celsius?
  - descripcion: 9/5 en Python da 1 (division entera de Python 2)
    probabilidad_estimada: 0.2
    pregunta_diagnostica: ¿Cuanto da 9/5 en Python 3? ¿1 o 1.8?
  - descripcion: Los parentesis en la formula son obligatorios para que Python calcule bien
    probabilidad_estimada: 0.3
    pregunta_diagnostica: ¿Que diferencia hay entre (9/5)*C + 32 y 9/5*C + 32 en Python? ¿Dan el mismo resultado?
  respuesta_pista:
  - nivel: 1
    pista: La formula esta en el enunciado. Decime primero que entra y que sale.
  - nivel: 2
    pista: Proba con 0. Es el caso mas facil de calcular mentalmente.
  - nivel: 3
    pista: Pensa en lo que aprendiste con el Ejercicio 8. Aca hay menos operaciones, no mas.
  - nivel: 4
    pista: 'Te tiro media linea: la conversion necesita una multiplicacion, una division y una suma. ¿En que orden?'
  heuristica_cierre:
    tests_min_pasados: 2
    heuristica: El episodio cierra cuando el estudiante confirma correctamente los dos casos canonicos (0°C=32°F y 100°C=212°F) y puede explicar por que se usa float y no int para la entrada.
  anti_patrones:
  - patron: No verificar el caso -40
    descripcion: Perderse el punto de coincidencia de las dos escalas a -40 es perder el momento de descubrimiento mas valioso del ejercicio para perfiles reflexivos.
    mensaje_orientacion: Proba con -40 Celsius. El resultado es algo famoso matematicamente.
  - patron: No discutir la precedencia de operadores
    descripcion: Aceptar la formula sin preguntar si los parentesis son necesarios deja sin explorar si el estudiante entiende la precedencia de * sobre +.
    mensaje_orientacion: ¿Los parentesis son obligatorios aca o Python calculariatambien sin ellos? Proba las dos versiones.
  - patron: Usar int para la temperatura
    descripcion: Castear a int impide ingresar temperaturas decimales como 36.5 que son frecuentes en uso real.
    mensaje_orientacion: ¿Podrias ingresar 36.5 si el input es int? ¿Que tipo conviene?
- titulo: E10 — Promedio de tres numeros
  enunciado_md: 'Crear un programa que pida al usuario 3 numeros e imprima por pantalla el

    promedio de dichos numeros.


    *Vinculo con material de catedra*: Ejercicio de cierre del TP1. Aritmetica

    simple pero ocasion privilegiada para activar la fase 5 del contrato socratico

    preguntando "¿y si fueran cuatro? ¿y si fueran cien?" para sembrar la

    motivacion de listas e iteracion que la proxima unidad va a trabajar.

    '
  inicial_codigo: 'a = float(input("Ingrese el primer numero: "))

    b = float(input("Ingrese el segundo numero: "))

    c = float(input("Ingrese el tercer numero: "))

    promedio = ...

    print(...)

    '
  unidad_tematica: secuenciales
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - print
    - input
    - float()
    - operadores aritmeticos
    conceptuales:
    - promedio aritmetico
    - casting a float
    - patron input-calcular-imprimir
  test_cases:
  - id: t1
    name: promedio de iguales
    type: stdin_stdout
    code: '10

      10

      10'
    expected: '10.0'
    is_public: true
    weight: 1
  - id: t2
    name: promedio de 1 2 3
    type: stdin_stdout
    code: '1

      2

      3'
    expected: '2.0'
    is_public: true
    weight: 1
  - id: t3
    name: mezcla decimales y enteros
    type: stdin_stdout
    code: '1.5

      2

      3'
    expected: '2.1666666666666665'
    is_public: false
    weight: 0.5
  rubrica:
    criterios:
    - nombre: Tres inputs
      descripcion: El programa solicita exactamente tres numeros
      puntaje_max: 0.3
    - nombre: Formula correcta
      descripcion: (a+b+c)/3
      puntaje_max: 0.5
    - nombre: Casting correcto
      descripcion: Los numeros se convierten a float
      puntaje_max: 0.2
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: Activar siempre la fase 5 sobre escalabilidad (¿y si fueran 100?) ya que es el objetivo pedagogico explicito del cierre del TP1.
  banco_preguntas:
    n1:
    - texto: Defini promedio con tus palabras. ¿Es siempre (a+b+c)/3 o hay otras formas de promediar?
      senal_comprension: El estudiante define promedio como suma dividida por cantidad y reconoce que hay otras formas (mediana, moda, ponderado) aunque aca usamos aritmetico.
      senal_alerta: El estudiante repite la formula sin definir; pedirle la definicion en palabras propias.
    - texto: ¿Los tres numeros pueden ser distintos tipos (uno entero, otro decimal) o el enunciado lo restringe?
      senal_comprension: El estudiante lee el enunciado y observa que no se restringe al tipo. Decide aceptar ambos para ser flexible.
      senal_alerta: El estudiante asume restriccion no escrita; mostrar que el enunciado no lo dice.
    - texto: ¿Los tres numeros los pedis uno por uno con tres input, o se te ocurre otra forma? En esta etapa lo mas claro es uno por uno.
      senal_comprension: El estudiante acepta tres input y reconoce la limitacion. Eventualmente intuye que con listas seria distinto.
      senal_alerta: El estudiante propone pedir los tres en una sola linea separados por espacio; aceptar la intencion y mostrar que con lo visto hasta aca tres input es lo adecuado.
    n2:
    - texto: ¿Vas a calcular (a+b+c)/3 o a/3 + b/3 + c/3? Matematicamente son iguales, en Python tambien. ¿Cual se lee mejor?
      senal_comprension: El estudiante elige (a+b+c)/3 por legibilidad y reconoce que las dos son equivalentes.
      senal_alerta: El estudiante usa la segunda forma; aceptar pero discutir por que la primera es mas estandar.
    - texto: '¿Tiene sentido casting a int o conviene float? Pensa en el caso 1, 2, 2: el promedio es 1.66 con decimal.'
      senal_comprension: El estudiante razona que necesita float porque los promedios pueden tener decimales aunque los datos sean enteros.
      senal_alerta: El estudiante usa int y trunca; mostrar el problema con 1, 2, 2 que daria 1 truncado a int.
    - texto: ¿Vas a guardar el promedio en una variable antes de imprimirlo o lo calculas directo en el print con f-string?
      senal_comprension: El estudiante elige una opcion y justifica.
      senal_alerta: El estudiante no decide; aceptar ambas.
    n3:
    - texto: Proba con 10, 10, 10. ¿Da 10?
      senal_comprension: El estudiante verifica 10 y conecta con la intuicion de que el promedio de iguales es el mismo numero.
      senal_alerta: El estudiante obtiene otro valor; redirigir a revisar la formula.
    - texto: Proba con 1, 2, 3. ¿Da 2?
      senal_comprension: El estudiante verifica 2 (que es la mediana coincidiendo con el promedio en este caso simetrico).
      senal_alerta: El estudiante obtiene 1.99... por float; aceptar y discutir precision de punto flotante brevemente.
    - texto: Proba con 0, 0, 0. ¿Da 0 sin error?
      senal_comprension: El estudiante confirma 0. La division por cantidad fija (3, no variable) no produce division por cero.
      senal_alerta: El estudiante anticipa error de division por cero; mostrar que la cantidad 3 esta hardcoded y no puede ser cero.
    - texto: Proba con 1.5, 2, 3 (mezcla decimales y enteros). ¿Funciona?
      senal_comprension: El estudiante observa que Python maneja la mezcla sin problema.
      senal_alerta: El estudiante anticipa error; mostrar que Python promueve int a float automaticamente.
    n4:
    - texto: Si en lugar de tres numeros fueran cuatro, ¿que cambiarias exactamente? ¿Y si fueran cien? Esta ultima pregunta planta la motivacion para listas e iteracion.
      senal_comprension: El estudiante razona que con cuatro cambia el divisor y agrega un input. Con cien reconoce la inviabilidad de cien input y siente la necesidad de listas.
      senal_alerta: El estudiante dice que cien tambien se hace con cien input; aceptar y sembrar la incomodidad de la repeticion masiva.
    - texto: Si supieras que existe una estructura que guarda muchos numeros en una sola variable, ¿como cambiaria este programa?
      senal_comprension: El estudiante intuye que podria iterar sobre esa estructura y dividir por la cantidad de elementos.
      senal_alerta: El estudiante no puede imaginarlo; aceptar y dejar la pregunta abierta.
  misconceptions:
  - descripcion: El promedio de tres enteros siempre es entero
    probabilidad_estimada: 0.5
    pregunta_diagnostica: ¿Cuanto es el promedio de 1, 2 y 2? ¿Es entero o tiene decimal?
  - descripcion: Dividir entre 3 con denominador fijo puede causar ZeroDivisionError
    probabilidad_estimada: 0.25
    pregunta_diagnostica: ¿Puede el programa fallar con ZeroDivisionError si los tres numeros son 0?
  - descripcion: Se necesita guardar el promedio en variable antes de imprimirlo
    probabilidad_estimada: 0.2
    pregunta_diagnostica: ¿Seria valido hacer print((a+b+c)/3) directamente sin guardar el promedio primero?
  respuesta_pista:
  - nivel: 1
    pista: Antes del codigo, decime los tres pasos del programa.
  - nivel: 2
    pista: El promedio es una formula que conoces desde la escuela. ¿La podas escribir en lenguaje natural primero?
  - nivel: 3
    pista: Pensa en el Ejercicio 7 (cuatro operaciones con dos numeros). Aca hay una sola operacion con tres numeros. ¿Que se mantiene?
  - nivel: 4
    pista: Te puedo confirmar la formula pero antes contame que cantidad va en el denominador.
  heuristica_cierre:
    tests_min_pasados: 2
    heuristica: 'El episodio cierra cuando el estudiante: (1) calcula correctamente con al menos dos casos (uno de iguales y uno mixto), (2) puede explicar por que usa float y no int, (3) verbaliza la incomodidad
      de escalar el programa a 100 numeros.'
  anti_patrones:
  - patron: No activar la fase 5 sobre escalabilidad
    descripcion: 'Cerrar el ejercicio sin preguntar por el caso de 100 numeros pierde el objetivo pedagogico explicito del cierre del TP1: sembrar la motivacion de listas e iteracion.'
    mensaje_orientacion: Si en lugar de tres numeros fueran cien, ¿que te empezaria a incomodar de este programa?
  - patron: Aceptar int para el casting del promedio
    descripcion: Castear los numeros a int hace que el promedio de 1, 2, 2 de 1 en lugar de 1.67, entregando un resultado matematicamente incorrecto sin error visible.
    mensaje_orientacion: Proba con 1, 2, 2. ¿Da 1.66 o da 1? Si da 1, revisa el tipo de dato que usas.
  - patron: No conectar con el patron general del TP
    descripcion: Cerrar el ultimo ejercicio sin mencionar el patron comun input-casting-calculo-print que se repite en los diez ejercicios pierde la oportunidad meta-cognitiva de cierre del TP1.
    mensaje_orientacion: Mirando para atras, ¿que notas en comun entre los diez ejercicios del TP?
- titulo: E1 — Edad mayor de 18
  enunciado_md: 'Escribir un programa que solicite la edad del usuario.

    Si el usuario es mayor de 18 anos, debera mostrar un mensaje en pantalla que diga

    «Es mayor de edad».

    '
  inicial_codigo: 'edad = int(input("Ingresa tu edad: "))

    # Tu codigo aqui

    '
  unidad_tematica: condicionales
  dificultad: basica
  prerequisitos:
    sintacticos:
    - if
    - input
    - int
    conceptuales:
    - operadores relacionales
    - variables
    - conversion de tipos
  test_cases:
  - id: t1
    name: edad mayor que 18 imprime mensaje
    type: stdin_stdout
    code: '25

      '
    expected: Es mayor de edad
    is_public: true
    weight: 1
  - id: t2
    name: edad exactamente 18 (umbral — decision del programador)
    type: stdin_stdout
    code: '18

      '
    expected: ''
    is_public: true
    weight: 1
  - id: t3
    name: edad menor que 18 no imprime nada
    type: stdin_stdout
    code: '15

      '
    expected: ''
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Lectura de entrada con int(input())
      descripcion: El programa convierte correctamente el input a entero.
      puntaje_max: 0.5
    - nombre: Logica condicional correcta
      descripcion: Usa if con operador relacional apropiado (> o >=) de manera justificada.
      puntaje_max: 0.5
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: null
  banco_preguntas:
    n1:
    - texto: ¿Que te pide hacer el ejercicio con tus propias palabras?
      senal_comprension: Reformula identificando entrada (edad), proceso (decision sobre umbral 18) y salida (mensaje condicional).
      senal_alerta: Parafrasea el enunciado literalmente o pasa directamente a escribir codigo.
    - texto: ¿Una persona de exactamente 18 anos es mayor de edad segun el enunciado?
      senal_comprension: Detecta la ambiguedad entre 'mayor de' (estrictamente mayor) y 'mayor o igual' (inclusivo) y pregunta por la convencion.
      senal_alerta: Responde si sin reflexionar (misconception M2) o responde no sin justificar.
    - texto: ¿Que pasa con tu programa si la persona tiene 16 anos? ¿El enunciado pide que muestre algun mensaje en ese caso?
      senal_comprension: 'Reconoce que el enunciado no pide else: si no es mayor, el programa no debe imprimir nada.'
      senal_alerta: 'Asume que tiene que imprimir ''Es menor de edad'' (misconception M12 invertida: agregar else no pedido).'
    n2:
    - texto: ¿Que operador relacional usarias para 'mayor de 18'?
      senal_comprension: Responde > (estrictamente mayor) y justifica la eleccion en funcion de la convencion que adopto en N1.
      senal_alerta: Duda entre > y >= o pregunta cual es la diferencia (revela que N1 no consolido).
    - texto: ¿Necesitas un else para este ejercicio?
      senal_comprension: Responde que no porque el enunciado no especifica salida para el caso menor.
      senal_alerta: Responde que si por simetria estetica (misconception M12).
    n3:
    - texto: ¿Probaste con edad 18 exactamente? ¿Que hace tu programa?
      senal_comprension: Ejecuta y verifica que el umbral funciona segun la convencion elegida.
      senal_alerta: No probo el umbral; dice 'funciona' despues de probar solo un caso tipico.
    - texto: ¿Probaste con edad 17 y con edad 19? ¿Que hace en cada caso?
      senal_comprension: 'Reporta resultados correctos para ambos: 19 imprime, 17 no imprime.'
      senal_alerta: Solo probo uno de los dos o no reporta los resultados explicitamente.
    n4:
    - texto: Si le pidieras al chatbot que escriba este programa por vos, ¿que version te entregaria? ¿La tuya y la del chatbot serian iguales?
      senal_comprension: Reflexiona sobre la decision de operador y convencion inclusive; reconoce que podrian diferir.
      senal_alerta: Responde que serian iguales sin haber pensado en la decision inclusive/exclusive.
    - texto: ¿Vale la pena consultar al chatbot para este ejercicio, o te parece que ya lo podias resolver solo? Justifica la decision.
      senal_comprension: Toma una posicion argumentada sobre autonomia vs. herramienta.
      senal_alerta: Responde mecanicamente sin justificar.
  misconceptions:
  - descripcion: 'M1: Confusion entre = (asignacion) y == (comparacion): el estudiante escribe if edad = 18:'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Si yo escribo if edad = 18:, ¿que quiero que Python haga, comparar o guardar? Probalo y mira el mensaje de error.
  - descripcion: 'M2: Lectura inclusive de ''mayor de 18'': el estudiante asume que 18 entra porque en castellano ''mayor de edad'' incluye los 18.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: El enunciado dice 'mayor de 18 anos'. Si alguien tiene exactamente 18, ¿es mayor de edad segun la frase? ¿Y segun la ley? ¿Las dos respuestas coinciden?
  - descripcion: 'M12: Cierre del condicional sin else interpretado como caso cubierto: el estudiante agrega else con ''Es menor de edad'' aunque el enunciado no lo pide.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Si la condicion de tu if es falsa, ¿que hace tu programa exactamente? ¿Imprime algo? ¿No imprime nada? ¿Es lo que pide el enunciado?
  respuesta_pista:
  - nivel: 1
    pista: 'Te voy a dar la mitad de la solucion, no toda. La estructura es asi: pedis la edad con input, la convertis a entero con int, y despues escribis un if con la condicion que vos elegiste. La condicion
      es lo que tenes que pensar. ¿Que condicion pones y por que?'
  - nivel: 2
    pista: La condicion compara edad con 18. Tenes que elegir entre > y >=. ¿Que dice el enunciado exactamente? ¿'Mayor de' incluye al 18 o no?
  - nivel: 3
    pista: Si adoptas la lectura estricta de 'mayor de', la condicion es edad > 18. Si adoptas la convencion legal (18 es mayor de edad), la condicion es edad >= 18. Elegis vos. Escribe el if con esa condicion.
  - nivel: 4
    pista: "edad = int(input(\"Ingresa tu edad: \"))\nif edad > 18:  # o >= 18 segun tu convencion\n    print(\"Es mayor de edad\")\n"
  heuristica_cierre:
    tests_min_pasados: 3
    heuristica: El tutor puede cerrar el episodio cuando el estudiante haya ejecutado al menos tres casos (por encima del umbral, por debajo, y exactamente en el umbral), haya justificado la eleccion de
      > o >= y haya reconocido que el else no esta pedido por el enunciado.
  anti_patrones:
  - patron: Dictado de estructura sintactica antes de identificar casos
    descripcion: El tutor dice 'Esto se resuelve con un if simple' antes de que el estudiante haya reformulado el enunciado. Salta la fase de apertura.
    mensaje_orientacion: ¿Cuantos casos distintos tenes que distinguir segun el enunciado? ¿Que pasa si la edad es exactamente 18?
  - patron: Correccion directa de la lectura inclusive del umbral
    descripcion: El tutor dice 'mayor de 18 no incluye el 18' sin haber abierto la pregunta por la ambiguedad. Cierra una ventana cognitiva de N1 fino.
    mensaje_orientacion: ¿Una persona de exactamente 18 anos es mayor de edad? ¿El enunciado lo dice explicitamente o lo deja implícito?
  - patron: Cierre prematuro sin tabla de prueba
    descripcion: El tutor dice 'Listo, ya esta' despues de que el estudiante mostro el codigo sin ejecutar ningun caso.
    mensaje_orientacion: 'Antes de cerrar: ¿probaste los tres casos minimos — un valor arriba del umbral, uno abajo, y exactamente 18?'
- titulo: E2 — Nota aprobada o desaprobada
