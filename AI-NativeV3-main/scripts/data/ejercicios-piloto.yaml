    mensaje_orientacion: Si el string es 'hola' y queres el ultimo caracter, ¿como lo obtendrias en Python? ¿Probaste con alguna sintaxis?
  - patron: Validacion delegada al tutor sin ejecucion
    descripcion: El tutor dice 'si, tu condicion esta bien' sin que el estudiante haya probado el caso de vocal mayuscula.
    mensaje_orientacion: Para. ¿Probaste con 'HOLA'? ¿La A mayuscula entra en tu condicion? Proba y contame.
- titulo: E8 — Nombre en mayusculas, minusculas o capitalizado
  enunciado_md: 'Escribir un programa que solicite al usuario que ingrese su nombre y el numero 1, 2 o 3

    dependiendo de la opcion que desee:

    1. Nombre en mayusculas (PEDRO)

