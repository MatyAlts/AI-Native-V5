    pregunta_diagnostica: Si una persona es estudiante de programacion y ademas trabaja en sistemas, ¿cumple la condicion 'estudiante OR trabaja en sistemas'? Mira la tabla de verdad de or en el apunte.
  - descripcion: 'M3: Cinco condiciones encadenadas con and en vez de or: el estudiante escribe s[-1] == ''a'' and s[-1] == ''e'' and... (que nunca puede ser verdadero).'
    probabilidad_estimada: 0.6
    pregunta_diagnostica: Si yo te digo que s[-1] debe ser 'a' AND 'e' AND 'i' AND 'o' AND 'u' al mismo tiempo, ¿puede un caracter ser igual a cinco letras distintas simultaneamente?
  - descripcion: 'M2: No considerar mayusculas: el estudiante prueba solo ''hola'' y no verifica con ''HOLA''.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: ¿Probaste con una frase en mayusculas? ¿La A mayuscula es vocal para tu condicion actual?
  respuesta_pista:
  - nivel: 1
    pista: 'El ultimo caracter de un string s lo obtenes con s[-1]. La forma mas limpia de chequear si esta en un conjunto de cinco vocales es: s[-1].lower() in ''aeiou''. Esa expresion devuelve True o
      False. Pero si preferis usar or, tambien es valido. ¿Cual queres probar primero?'
  - nivel: 2
    pista: 'Con in: if s[-1].lower() in ''aeiou'': → print(s + ''!''). else: → print(s). El .lower() convierte el caracter a minuscula antes de comparar, asi ''A'' y ''a'' se tratan igual.'
  - nivel: 3
    pista: "s = input(\"Frase o palabra: \")\nif s[-1].lower() in \"aeiou\":\n    print(s + \"!\")\nelse:\n    print(s)\n"
  - nivel: 4
    pista: 'Alternativa con or: if s[-1] == ''a'' or s[-1] == ''e'' or s[-1] == ''i'' or s[-1] == ''o'' or s[-1] == ''u'': — equivalente pero mas verboso. Con lower() + in es mas conciso.'
