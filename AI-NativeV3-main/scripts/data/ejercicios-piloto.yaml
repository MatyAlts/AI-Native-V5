      senal_alerta: Incorpora la extension del chatbot sin entender el metodo.
    - texto: ¿Te parece mas legible un elif con numero o un diccionario que mapee numero a funcion? Justifica.
      senal_comprension: Puede comparar ambos enfoques y argumentar el diccionario para extensibilidad vs elif para claridad didactica.
      senal_alerta: No conoce el patron de diccionario o lo descarta sin analizar.
