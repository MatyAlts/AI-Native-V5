      senal_comprension: Si, porque dice 'incluyendo 8 y 14' explicitamente.
      senal_alerta: Duda o responde no por M2.
    - texto: Una contrasena de 7 caracteres, ¿es valida? ¿Una de 15?
      senal_comprension: No en ambos casos.
      senal_alerta: Confunde el limite inclusive de 8 con el de 7.
    - texto: ¿Cuantas condiciones distintas tenes que evaluar para saber si la contrasena es correcta?
      senal_comprension: 'Dos: longitud mayor o igual a 8 y longitud menor o igual a 14.'
      senal_alerta: Una sola o tres.
    n2:
    - texto: ¿Que operador logico combina las dos condiciones?
      senal_comprension: and, porque ambas deben cumplirse simultaneamente.
      senal_alerta: or (M3 clasico), o dos if anidados (M8).
    - texto: ¿Podrias usar comparacion encadenada de Python como 8 <= len(p) <= 14? Probala y comparala con la version con and.
      senal_comprension: Prueba ambas, verifica que dan el mismo resultado y puede justificar cual prefiere.
      senal_alerta: No sabe que existe la comparacion encadenada y tampoco la investiga.
    - texto: Si usaras or en lugar de and, ¿que contrasenas serian aceptadas? Construi mentalmente o en papel un caso.
      senal_comprension: Razona que con or se aceptaria cualquier contrasena de 8 o mas, O cualquier contrasena de 14 o menos, es decir, practicamente todas.
      senal_alerta: No puede construir el contraejemplo mental.
    n3:
    - texto: Proba con contrasenas de 7, 8, 11, 14, 15 caracteres. ¿Tu programa las clasifica correctamente?
      senal_comprension: Reporta que 7 y 15 son invalidas, 8 y 14 son validas (umbrales inclusive), 11 es valida.
      senal_alerta: Solo probo el caso medio (11) y declaro correcto.
    - texto: ¿Probaste con la contrasena vacia? ¿Que hace tu programa?
      senal_comprension: Reconoce que len('') = 0 y cae en el else; toma decision de alcance.
      senal_alerta: No habia pensado en ese caso.
    n4:
    - texto: ¿Le pediste al chatbot que valide la contrasena con regex? ¿Esa solucion es mas simple o mas compleja que la tuya?
      senal_comprension: Reconoce que regex es mas complejo y excesivo para este requerimiento; prefiere la version con len y and.
      senal_alerta: Acepta la version con regex sin entenderla.
    - texto: Si el chatbot te devuelve la version con comparacion encadenada (8 <= len(p) <= 14), ¿la entendes o tenes que volver al apunte para verificar?
      senal_comprension: Puede explicar que es comparacion encadenada de Python y que es equivalente a and.
      senal_alerta: La acepta por ser mas corta sin entender su semantica.
  misconceptions:
  - descripcion: 'M3: and confundido con and enumerativo del lenguaje natural: el estudiante escribe len(p) == 8 and len(p) == 14.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Si yo te digo 'el numero esta entre 8 y 14', ¿que numeros cumplen esa condicion? ¿Cuales dos preguntas estas haciendo sobre un mismo numero?
  - descripcion: 'M2: Inclusive de 8 y 14 leida como exclusive a pesar de la aclaracion del enunciado.'
    probabilidad_estimada: 0.3
    pregunta_diagnostica: El enunciado dice 'incluyendo 8 y 14'. ¿Una contrasena de exactamente 8 caracteres es valida o no?
  - descripcion: 'M8: Condicional anidada usada para condiciones independientes: el estudiante escribe if len(p) >= 8: if len(p) <= 14: ... en lugar de and.'
    probabilidad_estimada: 0.4
    pregunta_diagnostica: Si yo quiero que se ejecute la linea cuando se cumplen las dos condiciones a la vez y no en ningun otro caso, ¿con que operador logico expresarias eso? ¿Que pasa con tu else si
      la longitud es 7?
  respuesta_pista:
  - nivel: 1
    pista: 'La funcion len(p) te da la cantidad de caracteres del string p. Probala primero: escribi p = ''hola'' y despues print(len(p)). Vas a ver que devuelve 4. Ahora tenes que escribir un if con dos
      condiciones combinadas con and. ¿Cuales dos condiciones?'
  - nivel: 2
    pista: 'Las dos condiciones son len(p) >= 8 (ocho o mas caracteres) y len(p) <= 14 (catorce o menos). Con and: if len(p) >= 8 and len(p) <= 14:. ¿Que imprime el if? ¿Y el else?'
  - nivel: 3
    pista: "p = input(\"Contrasena: \")\nif len(p) >= 8 and len(p) <= 14:\n    print(\"Ha ingresado una contrasena correcta\")\nelse:\n    print(\"Por favor, ingrese una contrasena de entre 8 y 14 caracteres\"\
      )\n"
  - nivel: 4
    pista: 'Alternativa equivalente valida: if 8 <= len(p) <= 14: → comparacion encadenada de Python. Ambas son correctas. Elegis la que mejor entiendas.'
  heuristica_cierre:
    tests_min_pasados: 4
    heuristica: El tutor puede cerrar cuando el estudiante haya probado los umbrales exactos (7, 8, 14, 15), use and correctamente (no or ni anidados), y haya descubierto len() antes de que el tutor se
      lo explique directamente.
  anti_patrones:
  - patron: Resolucion de la traduccion enunciado-codigo
    descripcion: El tutor dice 'donde dice entre 8 y 14 caracteres, eso es len(p) >= 8 and len(p) <= 14'. Hace la traduccion que es justamente lo que el estudiante tiene que aprender a hacer.
    mensaje_orientacion: ¿Que funcion te dice la cantidad de caracteres de un string? ¿Como expresarias en codigo la condicion 'entre 8 y 14'?
  - patron: Sustitucion del operador logico
    descripcion: El tutor dice 'no, ahi no va or, va and' si el estudiante pone or, sin abrir la pregunta por la semantica.
    mensaje_orientacion: Si usas or en lugar de and, ¿que contrasenas serian aceptadas? Construi un caso concreto con una contrasena de 5 caracteres y evalua tu condicion con or.
  - patron: Dictado de len() antes de que el estudiante investigue
    descripcion: El enunciado pide explicitamente 'investigar len()'. El tutor que lo entrega de entrada anula esa tarea.
    mensaje_orientacion: El enunciado dice 'investigar el uso de la funcion len() en Python'. ¿Ya buscaste? ¿Que encontraste?
- titulo: E6 — Consumo electrico con aviso adicional
  enunciado_md: 'Escribir un programa que solicite al usuario el consumo mensual de energia electrica en

    kilovatios (kWh) e indique la categoria del consumo segun el siguiente criterio:

    - Menor que 150 kWh: Consumo bajo

    - Entre 150 y 300 kWh inclusive: Consumo medio

    - Mayor que 300 kWh: Consumo alto


    Ademas, si el consumo supera los 500 kWh, mostrar un mensaje adicional que diga

    «Considere medidas de ahorro energetico».

    El programa debe imprimir por pantalla la categoria correspondiente.

    '
  inicial_codigo: 'c = float(input("Consumo en kWh: "))

    # Tu codigo aqui

    '
  unidad_tematica: condicionales
  dificultad: intermedia
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - input
    - float
    conceptuales:
    - condiciones jerarquicas
    - condicion adicional independiente
    - E4 cerrado
  test_cases:
  - id: t1
    name: consumo 100 — bajo
    type: stdin_stdout
    code: '100

      '
    expected: Consumo bajo
    is_public: true
    weight: 1
  - id: t2
    name: consumo 150 — medio (umbral inclusive)
    type: stdin_stdout
    code: '150

      '
    expected: Consumo medio
    is_public: true
    weight: 1
  - id: t3
    name: consumo 600 — alto + aviso
    type: stdin_stdout
    code: '600

      '
    expected: 'Consumo alto

      Considere medidas de ahorro energetico'
    is_public: false
    weight: 1
  - id: t4
    name: consumo 500 — alto sin aviso (limite exclusive)
    type: stdin_stdout
    code: '500

      '
    expected: Consumo alto
    is_public: false
    weight: 1
  - id: t5
    name: consumo 300 — medio (umbral superior inclusive)
    type: stdin_stdout
    code: '300

      '
    expected: Consumo medio
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Tres categorias correctas con if-elif-else
      descripcion: Estructura encadenada, no cuatro if incluyendo el aviso.
      puntaje_max: 0.5
    - nombre: Aviso como if independiente, no cuarta categoria
      descripcion: El aviso se imprime ADEMAS de la categoria, no en lugar.
      puntaje_max: 0.5
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: El punto critico de este ejercicio es que el aviso NO es una cuarta categoria. El tutor debe dejar que el estudiante descubra eso por la ambiguedad de la palabra 'adicional'
      en el enunciado.
  banco_preguntas:
    n1:
    - texto: ¿Cuantas categorias de consumo distingue el enunciado?
      senal_comprension: 'Tres: bajo, medio, alto.'
      senal_alerta: Cuatro, porque cuenta el aviso de ahorro como una cuarta categoria (M9 incipiente).
    - texto: El aviso de ahorro energetico, ¿es una cuarta categoria o es un mensaje adicional?
      senal_comprension: Mensaje adicional independiente, que se suma a la categoria correspondiente cuando se supera 500.
      senal_alerta: Cuarta categoria exclusiva.
    - texto: Un consumo de exactamente 150 kWh, ¿es bajo o medio? ¿Y uno de 300 kWh?
      senal_comprension: 'Medio en ambos casos: el enunciado dice ''entre 150 y 300 inclusive''.'
      senal_alerta: Confunde uno de los dos por aplicacion inconsistente de M2.
    n2:
    - texto: ¿Que estructura usas para las tres categorias?
      senal_comprension: if-elif-else con tres ramas.
      senal_alerta: Tres if separados (M5) o cuatro if incluyendo el aviso.
    - texto: '¿Donde colocas el if del aviso de ahorro: dentro de la rama de Consumo alto, despues de toda la cadena elif, o anidado?'
      senal_comprension: Despues de la cadena, como if independiente; reconoce que es una decision adicional separada.
      senal_alerta: Dentro del else de 'Consumo alto' solo (corto para consumos entre 301 y 500).
    - texto: Si el consumo es 450 kWh, ¿que mensajes imprime tu programa? ¿Y si es 550?
      senal_comprension: '450: solo ''Consumo alto''. 550: ''Consumo alto'' Y ''Considere medidas de ahorro energetico''.'
      senal_alerta: Confunde los dos casos o piensa que 550 solo imprime el aviso.
    n3:
    - texto: Proba con 100, 150, 200, 300, 400, 500, 550, 1000. ¿Cada caso imprime los mensajes correctos?
      senal_comprension: Ejecuta todos y reporta correctamente, especialmente 500 (solo categoria) vs 550 (categoria + aviso).
      senal_alerta: No probo el umbral exacto de 500.
    - texto: ¿Probaste con consumo exactamente 500 kWh? ¿Imprime el aviso de ahorro? ¿El enunciado dice 'supera' o 'mayor o igual'?
      senal_comprension: Lee 'supera' como estrictamente mayor que 500; 500 no imprime el aviso.
      senal_alerta: Asume que 500 imprime el aviso por M2.
    n4:
    - texto: Si tuvieras que reescribir este programa con la categoria y el aviso en un solo bloque condicional, ¿como lo harias? ¿Es mas legible?
      senal_comprension: Evalua que un solo bloque seria mas complejo de mantener; el if separado es mas claro conceptualmente.
      senal_alerta: Intenta fusionarlos sin considerar legibilidad.
    - texto: Si el chatbot te sugiere usar elif para el aviso de ahorro, ¿estas de acuerdo? ¿Por que si o por que no?
      senal_comprension: 'Rechaza: elif haría que el aviso reemplace a la categoria en vez de sumarse. Puede construir el contraejemplo.'
      senal_alerta: Acepta la sugerencia del chatbot sin verificar el comportamiento.
  misconceptions:
  - descripcion: 'M9: Aviso de ahorro como cuarta categoria exclusiva: el estudiante pone el aviso en un elif, de modo que un consumo de 550 solo imprime el aviso y no ''Consumo alto''.'
    probabilidad_estimada: 0.7
    pregunta_diagnostica: Tu else ultima rama, ¿que casos exactamente cubre? Si ingreso 450, ¿que imprime? ¿Es lo que pide el enunciado?
  - descripcion: 'M2: Lectura inclusive de ''supera 500'': el estudiante usa >= 500 en lugar de > 500 para el aviso.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: El enunciado dice 'si el consumo supera los 500 kWh'. ¿'Supera' incluye el 500 exacto o es estrictamente mayor?
  - descripcion: 'M5: if separados para las tres categorias: el estudiante usa tres if independientes en vez de if-elif-else.'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Si yo tengo if c < 150 e if c >= 150 and c <= 300 e if c > 300, ¿puede ocurrir que mas de un if sea verdadero para el mismo consumo?
  respuesta_pista:
  - nivel: 1
    pista: 'Mira: hay dos decisiones separadas. La primera es que categoria imprimir, y para eso usas if-elif-else con tres ramas. La segunda es si imprimir o no el aviso de ahorro, y para eso usas un if
      separado despues de la cadena, con la condicion c > 500. Pero atencion: el aviso se imprime ADEMAS de la categoria, no en lugar. ¿Como escribis ese segundo if?'
  - nivel: 2
    pista: "if c < 150:\n    print(\"Consumo bajo\")\nelif c <= 300:\n    print(\"Consumo medio\")\nelse:\n    print(\"Consumo alto\")\n# El aviso va despues, independiente:\nif c > 500:\n    print(\"Considere\
      \ medidas de ahorro energetico\")\n"
  - nivel: 3
    pista: La clave es que el segundo if (el del aviso) esta al mismo nivel que el primero, no adentro. Eso garantiza que se evalua siempre, independientemente de la categoria.
  - nivel: 4
    pista: 'Codigo completo: ver nivel 2. La decision de poner el aviso como if separado es de diseno: conceptualmente son dos decisiones distintas (categoria y ahorro), y el codigo lo refleja.'
  heuristica_cierre:
    tests_min_pasados: 5
    heuristica: El tutor puede cerrar cuando el estudiante haya probado el caso 500 kWh (solo categoria) y 550 kWh (categoria + aviso), use if-elif-else para las tres categorias, y el aviso sea un if independiente
      (no elif ni dentro del else).
  anti_patrones:
  - patron: Dictado de umbrales — cierre prematuro de ambiguedad fertil
    descripcion: El tutor dice directamente que 150 es medio y 300 es medio sin abrir la pregunta inclusive/exclusive, que aqui el enunciado resuelve pero el estudiante debe leer.
    mensaje_orientacion: 'Antes de responder: ¿que lecturas posibles ves para el umbral 150? Si 150 fuera bajo, ¿que pasa con 150.01? Si 150 fuera medio, ¿que pasa con 149.99?'
  - patron: Anidamiento prematuro
    descripcion: El tutor sugiere 'pon el aviso dentro del else' antes de que el estudiante haya descubierto que es una condicion independiente.
    mensaje_orientacion: ¿Las condiciones que tenes son todas del mismo tipo, o algunas dependen de otras? ¿Que informacion necesitas conocer primero para saber que pregunta hacer despues?
  - patron: Resolucion de la traduccion enunciado-codigo para el aviso
    descripcion: El tutor dice 'el aviso va en un if separado con c > 500' sin que el estudiante haya descubierto que el aviso no es una cuarta categoria.
    mensaje_orientacion: 'Relees el enunciado: ''ademas, si el consumo supera los 500 kWh, mostrar un mensaje adicional''. ¿Que te dice esa palabra ''ademas''?'
- titulo: E7 — Frase termina con vocal
