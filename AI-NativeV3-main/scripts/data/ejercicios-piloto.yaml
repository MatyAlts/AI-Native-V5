- titulo: E9 — Magnitud de terremoto
  enunciado_md: 'Escribir un programa que pida al usuario la magnitud de un terremoto y clasifique segun la

    escala de Richter:

    - Menor que 3: Muy leve

    - Entre 3 y 4 (mayor o igual a 3, menor que 4): Leve

    - Entre 4 y 5 (mayor o igual a 4, menor que 5): Moderado

    - Entre 5 y 6 (mayor o igual a 5, menor que 6): Fuerte

    - Entre 6 y 7 (mayor o igual a 6, menor que 7): Muy Fuerte

    - Mayor o igual a 7: Extremo


    Los rangos intermedios son mayor o igual al limite inferior y menor que el limite superior.

    '
  inicial_codigo: 'm = float(input("Magnitud del terremoto: "))

    # Tu codigo aqui (pista: usa float, no int)

    '
  unidad_tematica: condicionales
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - input
    - float
    conceptuales:
    - elif extenso con 6 categorias
    - implicitud del limite inferior en cadena elif
    - conversion a float
  test_cases:
  - id: t1
    name: magnitud 2.9 — Muy leve
    type: stdin_stdout
    code: '2.9

      '
    expected: Muy leve
    is_public: true
    weight: 1
  - id: t2
    name: magnitud 3.0 — Leve (umbral inferior inclusive)
    type: stdin_stdout
    code: '3.0

      '
    expected: Leve
    is_public: true
    weight: 1
  - id: t3
    name: magnitud 7.0 — Extremo (umbral inferior inclusive)
    type: stdin_stdout
    code: '7.0

      '
    expected: Extremo
    is_public: false
    weight: 1
  - id: t4
    name: magnitud 6.99 — Muy Fuerte
    type: stdin_stdout
    code: '6.99

      '
    expected: Muy Fuerte
    is_public: false
    weight: 1
  - id: t5
    name: magnitud 8.5 — Extremo
    type: stdin_stdout
    code: '8.5

      '
    expected: Extremo
    is_public: false
    weight: 1
  rubrica:
    criterios:
    - nombre: Conversion a float (no int)
      descripcion: Usa float(input()), no int(input()).
      puntaje_max: 0.3
    - nombre: Seis categorias correctas
      descripcion: Todas las categorias de la escala de Richter cubiertas y en orden.
      puntaje_max: 0.4
    - nombre: Implicitud del limite inferior en cada elif
      descripcion: Cada elif solo tiene el limite superior; el inferior esta implicito por el orden de la cadena.
      puntaje_max: 0.3
  tutor_rules:
    prohibido_dar_solucion: true
    forzar_pregunta_antes_de_hint: false
    nivel_socratico_minimo: 1
    instrucciones_adicionales: null
  banco_preguntas:
    n1:
    - texto: ¿Cuantas categorias son? ¿Los rangos se tocan en los enteros o se solapan?
      senal_comprension: Seis categorias; los rangos se tocan (cada limite superior exclusivo coincide con el limite inferior inclusive del siguiente).
      senal_alerta: No verifica los umbrales o dice que se solapan.
    - texto: Magnitud exactamente 4.0, ¿que categoria?
      senal_comprension: Moderado, porque el enunciado dice 'mayor o igual a 4, menor que 5'.
      senal_alerta: Duda o dice Leve por M2.
    - texto: La magnitud, ¿es entera o decimal en la practica de sismologia?
      senal_comprension: Decimal; justifica usar float en lugar de int.
      senal_alerta: No lo habia pensado; usa int().
    n2:
    - texto: ¿Como escribis la condicion de la primera rama elif intermedia (Leve)?
      senal_comprension: 'elif m < 4: — solo el limite superior, porque el inferior (m >= 3) esta implicito.'
      senal_alerta: 'Escribe elif m >= 3 and m < 4: (redundante pero correcto; el tutor puede preguntar si es necesario).'
    - texto: ¿Hace falta repetir la condicion del limite inferior en cada elif, o el orden de la cadena la implica?
      senal_comprension: 'No hace falta: si llego al elif, ya se que no entro en ningun if anterior.'
      senal_alerta: Cree que es obligatorio repetir el limite inferior (M7).
    - texto: Para la ultima categoria, ¿usas elif con la condicion >= 7 o usas else?
      senal_comprension: 'Argumenta la decision: else captura todo >= 7 sin condicion explicita; elif >= 7 documenta mejor el limite.'
      senal_alerta: Elige sin justificar.
    n3:
    - texto: Proba con 2.9, 3.0, 3.5, 4.0, 5.0, 6.0, 7.0, 8.5. ¿Cada uno entra en la categoria correcta?
