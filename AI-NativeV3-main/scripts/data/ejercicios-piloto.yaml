    pista: "nombre = input(\"Nombre: \")\nopcion = input(\"Opcion (1, 2, 3): \")\nif opcion == \"1\":\n    print(nombre.upper())\nelif opcion == \"2\":\n    print(nombre.lower())\nelif opcion == \"3\":\n\
