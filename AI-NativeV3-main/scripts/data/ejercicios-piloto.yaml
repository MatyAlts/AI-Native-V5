  - descripcion: 'isalpha() devuelve string: el estudiante escribe while nombre.isalpha() == ''True'''
    probabilidad_estimada: 0.45
    pregunta_diagnostica: 'Proba en el interprete: type(''hola''.isalpha()). Que tipo te da?'
