      Resta: 7

      Multiplicacion: 30

      Division: 3.3333333333333335'
    is_public: true
    weight: 1
  - id: t2
    name: operaciones con 7 y 7
    type: stdin_stdout
    code: '7

      7'
    expected: 'Suma: 14

      Resta: 0

      Multiplicacion: 49

      Division: 1.0'
    is_public: true
    weight: 0.5
  - id: t3
    name: entrada decimal cuando se pide entero
    type: stdin_stdout
