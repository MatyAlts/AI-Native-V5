    n2:
    - texto: La condicion del while principal del combate, es vida_gladiador > 0 and vida_enemigo > 0, o vida_gladiador > 0 or vida_enemigo > 0? Por que?
      senal_comprension: El estudiante razona que con and el while sigue mientras ambos esten vivos; en cuanto uno cae, el while corta. Con or seguiria mientras al menos uno este vivo, lo cual es semanticamente
        incorrecto.
      senal_alerta: 'El estudiante elige or; pedirle que pruebe mentalmente: si vida_enemigo llega a 0 pero vida_gladiador es 50, el combate termino o sigue?'
    - texto: Como organizas el flujo del turno del jugador y el turno del enemigo dentro del while? Son dos sub-bloques separados?
      senal_comprension: 'El estudiante razona: dentro del while, primero el bloque del turno del jugador (mostrar estado, pedir opcion con validacion, ejecutar accion), despues el bloque del enemigo (restar
        12 a vida_gladiador).'
      senal_alerta: El estudiante propone dos while alternados; admitir como variante pero notar que la estructura natural es un solo while con dos sub-bloques secuenciales por iteracion.
    - texto: Para el calculo del critico, como escribis la multiplicacion para que de float seguro? Que pasa si escribis dano_base * (1 + 0.5)?
      senal_comprension: El estudiante razona que dano_base * 1.5 da 22.5 directamente; dano_base * (1 + 0.5) tambien funciona porque 1 + 0.5 promueve a float.
      senal_alerta: El estudiante intenta int(dano_base * 1.5) para forzar entero; corregir mostrando que el enunciado pide float.
    n3:
    - texto: Mostrame el while del combate principal con su condicion compuesta. Mostrame tambien el while de validacion del menu interno.
      senal_comprension: 'El estudiante escribe while vida_gladiador > 0 and vida_enemigo > 0: para el combate principal. Para la validacion, while not opcion.isdigit() or int(opcion) < 1 or int(opcion)
        > 3.'
      senal_alerta: El estudiante reusa la condicion del E2 con rango 1 a 4 sin ajustar; senalarle que aca son tres opciones.
    - texto: Mostrame la logica del ataque pesado incluyendo el caso del critico. Como decides cual dano aplicar?
      senal_comprension: 'El estudiante escribe if vida_enemigo < 20: dano = dano_base * 1.5; else: dano = dano_base. Despues vida_enemigo -= dano. El calculo del critico se evalua con la vida del enemigo
        ANTES del ataque.'
      senal_alerta: El estudiante hace vida_enemigo -= dano_base primero y despues calcula el critico; al probar, descubre que el orden cambia el resultado.
    - texto: Para Curar, mostrame el if que decide entre los dos casos. Donde queda la linea del ataque del enemigo? Adentro del if, afuera, o repetida en ambas ramas?
      senal_comprension: El estudiante reconoce que el ataque del enemigo va FUERA del if-else de curar (queda al final del bloque del turno del jugador, independiente del exito de la accion).
      senal_alerta: El estudiante pone el ataque del enemigo solo dentro de la rama con pociones; al probar el caso sin pociones, descubre que el enemigo no ataca.
    n4:
    - texto: Si el TP pidiera dos enemigos consecutivos (matas al primero, aparece el segundo con vida 100), que cambia en el codigo?
      senal_comprension: El estudiante razona que necesita envolver el while actual en otro while o for de dos iteraciones, con la vida del enemigo reseteada a 100 al inicio de cada enemigo. Las pociones
        se conservan entre enemigos.
      senal_alerta: 'El estudiante no sabe como resetear la variable; preguntar: si vida_enemigo quedo en -5, que linea sola volveria a ponerlo en 100 para el siguiente enemigo?'
    - texto: Si el critico fuera por probabilidad (20% de chance en cada ataque normal) en lugar de por vida baja, como cambia el codigo?
      senal_comprension: El estudiante razona que necesita import random y if random.random() < 0.2 antes de calcular el critico. La estructura del if cambia pero la rama del calculo del dano se mantiene.
      senal_alerta: 'El estudiante dice que habria que rehacer la logica del combate; preguntar: que cambia: la condicion del critico o el calculo del dano una vez activado?'
    - texto: Como conectas este ejercicio con los cuatro anteriores del integrador? Que patron aparece en los cinco?
      senal_comprension: 'El estudiante identifica el patron comun: while exterior mas while interno de validacion mas estado mutable actualizable. Puede ejemplificar con al menos tres de los cinco ejercicios.'
      senal_alerta: El estudiante no puede identificar el patron sin ayuda; esto es hueco evidencial que el docente debe registrar para discusion en catedra.
  misconceptions:
  - descripcion: 'Calculo del critico como int: el estudiante escribe int(dano_base * 1.5) o aplica conversion perdiendo decimales que el enunciado pide explicitamente'
    probabilidad_estimada: 0.45
    pregunta_diagnostica: Proba print(type(dano)) despues de calcular el critico. Que dice? Deberia decir float.
  - descripcion: 'Condicion del while con or en lugar de and: while vida_gladiador > 0 or vida_enemigo > 0 nunca corta hasta que ambos sean cero'
    probabilidad_estimada: 0.5
    pregunta_diagnostica: Fuerza vida_enemigo a 0 manualmente. Tu while corta o sigue? Si sigue, cuantas iteraciones mas hace?
  - descripcion: Curar sin pociones manejado con if-else pero olvidando ejecutar el ataque del enemigo en la rama sin pociones
    probabilidad_estimada: 0.55
    pregunta_diagnostica: Proba curar cuando pociones = 0. El enemigo ataca en ese turno? Tu vida_gladiador baja 12 puntos?
  - descripcion: Ataque del enemigo dentro de un if que verifica solo el caso de accion exitosa, no ejecutandose cuando el jugador elige curar sin pociones
    probabilidad_estimada: 0.55
    pregunta_diagnostica: Mostrame donde esta la linea vida_gladiador -= dano_enemigo. Esta adentro del if de curar o afuera?
  - descripcion: Rafaga Veloz implementada como tres sentencias separadas en lugar de un for con range, contraviniendo el enunciado
    probabilidad_estimada: 0.35
    pregunta_diagnostica: El enunciado dice 'usar un bucle for con range'. Tu solucion tiene un for o tres sentencias separadas?
  - descripcion: Critico evaluado despues de aplicar el dano (vida del enemigo ya reducida) en lugar de antes
    probabilidad_estimada: 0.4
    pregunta_diagnostica: En tu codigo, cuantas lineas hay entre el if vida_enemigo < 20 y la resta del dano? El if se evalua con la vida antes o despues del golpe?
  respuesta_pista:
  - nivel: 1
    pista: 'Antes de pedirme la condicion del while, contame: cuando termina el combate en lengua natural? Despues traduis.'
  - nivel: 2
    pista: Si tu critico no se activa, mostrame el if que lo decide. La condicion es vida_enemigo < 20 o vida_enemigo <= 20? En que caso del enunciado se activa el critico exactamente?
  - nivel: 3
    pista: Si tu Rafaga hace tres golpes pero el primero no se ve, mostrame el for. El print esta dentro del for o queda afuera por sangria?
  - nivel: 4
    pista: Probaste curar sin pociones? Si el enemigo no ataca en ese caso, mostrame donde esta la linea del contraataque. Esta adentro de la rama con pociones?
  heuristica_cierre:
    tests_min_pasados: 3
    heuristica: Cerrar cuando el estudiante (a) prueba el ejemplo del enunciado obteniendo la salida exacta esperada, (b) prueba el caso del critico con vida del enemigo manualmente bajada, (c) prueba las
      tres opciones del menu con sus validaciones, (d) prueba curar sin pociones verificando que el enemigo igual ataca, (e) responde la fase 5 sobre el patron comun a los cinco ejercicios del integrador.
      El cierre exige verbalizar la diferencia entre estado interno (variables) y andamio pedagogico (variables declarativas no usadas operativamente como turno_gladiador).
  anti_patrones:
  - patron: Aceptar solucion con Rafaga como tres sentencias print separadas sin for
    descripcion: El tutor no cuestiona la implementacion sin for; el enunciado exige explicitar el for con range como practica de la estructura iterativa
    mensaje_orientacion: El enunciado pide 'un bucle for con range'. Tu solucion tiene un for o tres sentencias? Si no tiene for, reescribila.
  - patron: No exigir la fase 5 meta del integrador (patron comun a los cinco ejercicios)
    descripcion: El tutor cierra el episodio del E5 sin activar la pregunta de conexion con los cuatro ejercicios anteriores; esto deja sin cierre la trayectoria completa del integrador
    mensaje_orientacion: 'Antes de cerrar: conecta este ejercicio con los cuatro anteriores del integrador. Que patron comun ves en los cinco?'
  - patron: Aceptar or en la condicion del while del combate sin pedir que el estudiante lo pruebe
    descripcion: El tutor no diagnostica el or en lugar de and; al ejecutar, el combate sigue hasta que ambos HP sean 0 o negativos, lo cual nunca ocurre si el jugador muere primero con enemigo con HP positivo
    mensaje_orientacion: 'Proba esto: fuerza vida_enemigo a 0 en el codigo al inicio. Tu while corta en el primer turno o sigue? Si sigue, el and/or del while tiene un bug.'
