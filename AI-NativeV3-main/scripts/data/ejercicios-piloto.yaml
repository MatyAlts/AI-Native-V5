      senal_comprension: El estudiante razona que la constante de cerraduras se cambia (3 a 5) y se actualizan las condiciones de victoria; la regla anti-spam no necesariamente cambia (es independiente).
      senal_alerta: El estudiante dice que hay que rehacer todo; pedirle que identifique lineas puntuales que cambian.
