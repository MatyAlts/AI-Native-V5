    n2:
    - texto: ¿Usas else o cuarto elif para capturar la opcion invalida? ¿Que diferencia hace?
      senal_comprension: 'Prefiere else: cubre todos los casos invalidos sin enumerar; cuarto elif solo cubriria ''4''.'
