      El else lo usas para mensaje de opcion invalida. ¿Convertis opcion a int o lo comparas como string? Probalo de las dos formas y observa la diferencia.'
  - nivel: 2
    pista: 'La diferencia: si usas int(input(...)), crashea con ValueError si el usuario tipea ''abc''. Si comparas como string (''1'', ''2'', ''3''), el else captura cualquier entrada invalida sin crashear.
