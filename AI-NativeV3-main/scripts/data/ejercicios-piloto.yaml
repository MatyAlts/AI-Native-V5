- titulo: 'E4 — Escape Room: La Boveda'
  enunciado_md: 'Simulador donde el jugador intenta abrir una boveda con 3 cerraduras antes de quedarse sin energia o sin tiempo.


    **Variables iniciales (NO se piden por teclado):**

    - `energia = 100`, `tiempo = 12`, `cerraduras_abiertas = 0`

    - `alarma = False`, `codigo_parcial = ''''`


    **Validaciones obligatorias:** pedir nombre del agente con `.isalpha()` en `while`; validar opciones del menu con `.isdigit()` en `while`; sin `try/except`.


    **Regla anti-spam:** si el jugador elige Forzar cerradura **3 veces seguidas**, se cobra el costo normal (-20 energia, -2 tiempo), NO abre la cerradura y se activa la alarma automaticamente. Si elige
    opcion 2 o 3, se corta la racha de forzar.


    **Menu de acciones** (se repite mientras el juego siga):


    1. **Forzar cerradura** (-20 energia, -2 tiempo; si energia < 40 hay riesgo de alarma con pedido de numero 1-3, si elige 3 alarma=True; si no hay alarma, abre 1 cerradura)

    2. **Hackear panel** (-10 energia, -3 tiempo; usa un `for` de 4 pasos, en cada paso suma una letra al codigo parcial; si `len(codigo_parcial) >= 8` se abre automaticamente 1 cerradura si todavia faltan)

    3. **Descansar** (+15 energia con max 100, -1 tiempo; si alarma ON, -10 energia extra)


    **Regla de bloqueo por alarma:** si `alarma == True` y `tiempo <= 3` y no se abrio la boveda, el sistema se bloquea y se pierde.


    **Condiciones de fin:** 3 cerraduras abiertas = victoria; energia<=0 o tiempo<=0 = derrota; bloqueo por alarma = derrota.

    '
  inicial_codigo: "nombre_agente = ''\nwhile not nombre_agente.isalpha():\n    nombre_agente = input(\"Ingresa el nombre del agente (solo letras): \")\n\nenergia = 100\ntiempo = 12\ncerraduras_abiertas\
    \ = 0\nalarma = False\ncodigo_parcial = ''\nforzar_consecutivas = 0\nbloqueado = False\n"
  unidad_tematica: mixtos
  dificultad: avanzada
  prerequisitos:
    sintacticos:
    - if
    - elif
    - else
    - while
    - for
    - range
    - input
    - print
    - len
    - isalpha
    - isdigit
    - bool
    - and
    - or
    - not
    - min
    conceptuales:
    - estado mutable con multiples variables interdependientes
    - condicion compuesta de fin del while con and (no or)
    - contador de acciones consecutivas vs contador total
    - for de pasos fijos con efecto colateral acumulado
    - cap de valor con min() o if posterior
    - orden de aplicacion de costos vs deteccion de condicion especial
