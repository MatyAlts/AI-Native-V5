# Infraestructura prod-like para piloto-2 ampliado UTN.
#
# ─────────────────────────────────────────────────────────────────────
# RESUMEN EJECUTIVO — containers que levanta este compose
# ─────────────────────────────────────────────────────────────────────
#   INFRA (11):
#     postgres          base academic_main + ctr_store + classifier_db + content_db
#     keycloak-db       postgres dedicado a Keycloak (separado por ADR-002)
#     keycloak          IdP/auth (realm UTN)
#     redis             bus eventos CTR (8 streams ctr.p0..p7) + rate-limit + sessions
#     minio             storage S3 para materiales + archive CTR
#     otel-collector    receptor OTLP gRPC -> jaeger/prometheus/loki
#     jaeger            traces UI (puerto interno, acceso por SSH tunnel)
#     prometheus        metricas + alertas
#     alertmanager      ruteo de alertas (email institucional UTN)
#     loki              logs estructurados
#     grafana           UI unificada (loopback 3000)
#
#   PYTHON SERVICES (10):
#     api-gateway       :8000 (unico expuesto a internet via reverse-proxy)
#     academic-service  :8002 (CRUDs + bulk-import)
#     evaluation-service :8004 (entregas + calificaciones)
#     analytics-service :8005 (kappa, progresion, alertas predictivas)
#     tutor-service     :8006 (SSE socratico con guardrails)
#     ctr-service       :8007 (cadena criptografica append-only, productor + API audit)
#     classifier-service :8008 (N4 + 3 coherencias en 5 metricas)
#     content-service   :8009 (RAG pgvector + materiales)
#     governance-service :8010 (prompts versionados, internal-only)
#     ai-gateway        :8011 (LLM proxy con BYOK por tenant)
#
#   CTR WORKERS (8):
#     ctr-worker-0..7   single-writer por particion (ADR-010), drenan ctr.pN -> postgres
#
#   FRONTENDS (1):
#     frontends         nginx sirviendo web-admin + web-teacher + web-student +
#                       proxy /api/* a api-gateway (loopback :8080)
#
#   TOTAL: 30 containers. integrity-attestation-service NO esta aca (ADR-021,
#   vive en VPS UTN aparte como infra institucional).
#
# ─────────────────────────────────────────────────────────────────────
# DIFERENCIAS CON dev:
#   - Credenciales via ${VAR} desde .env.prod (NO hardcoded admin/admin)
#   - Los 10 servicios Python corren en containers (build .) — no en host
#   - Solo api-gateway, Grafana, Keycloak admin y frontends exponen al host
#   - Red interna platform-prod aislada
#   - dev_trust_headers=false por contrato (api-gateway exige JWT real)
#   - integrity-attestation-service NO está acá (vive en VPS UTN aparte, ADR-021)
#
# Uso:
#   cp infrastructure/.env.prod.example infrastructure/.env.prod
#   # editar .env.prod con secrets reales
#   docker compose -f infrastructure/docker-compose.prod.yml --env-file infrastructure/.env.prod up -d
#
# Validar:
#   bash scripts/check-health.sh
#   make test-rls
#
# Levantar solo deps (postgres + redis + keycloak) para tests:
#   docker compose -f infrastructure/docker-compose.prod.yml up -d postgres redis keycloak minio
#
# Ver docs/VPS-DEPLOY.md para guia completa de bootstrap + troubleshooting.

name: platform-prod

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
  networks:
    - default
  environment:
    LOG_LEVEL: ${LOG_LEVEL:-info}
    LOG_FORMAT: json
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    OTEL_SERVICE_NAME_PREFIX: platform

# Defaults compartidos por los 8 ctr-workers (ADR-010): mismo build que
# ctr-service (Dockerfile y codigo identicos), pero el ENTRYPOINT lo
# overrideamos con `command:` para correr el partition_worker. NO exponen
# puertos (no escuchan HTTP).
x-ctr-worker-defaults: &ctr-worker-defaults
  build:
    context: ..
    dockerfile: apps/ctr-service/Dockerfile
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"
  networks:
    - default
  environment: &ctr-worker-env
    LOG_LEVEL: ${LOG_LEVEL:-info}
    LOG_FORMAT: json
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    OTEL_SERVICE_NAME_PREFIX: platform
    CTR_STORE_URL: postgresql+asyncpg://ctr_user:${CTR_DB_PASSWORD}@postgres:5432/ctr_store
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    # El docker-entrypoint del ctr-service lee estas env vars para decidir
    # si arranca server o worker. Cada ctr-worker-N override CTR_WORKER_PARTITION.
    # Robusto contra overrides de EasyPanel que pisarian el `command:`.
    CTR_MODE: worker
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  # ════════════════════════════════════════════════════════════════════
  # CAPA DE INFRA — bases, mensajeria, storage, observabilidad
  # ════════════════════════════════════════════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    container_name: platform-prod-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init-dbs.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
    # Sin ports exposes — solo accesible desde la red interna.

  keycloak-db:
    image: postgres:16-alpine
    container_name: platform-prod-keycloak-db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD requerido}
    volumes:
      - kc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: platform-prod-keycloak
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # NOTA: `--db=postgres` es BUILD-TIME en Keycloak — pasarlo solo como
    # env var KC_DB no alcanza. El log lo confirma:
    #   "build time non-cli options have values that differ from what is
    #    persisted - the new values will NOT be used until another build
    #    is run: kc.db, kc.health-enabled"
    # Al pasar `--db=postgres` como argumento del `start`, Keycloak detecta
    # el cambio build-time y hace el build implicito antes de arrancar
    # (~30s extra al primer startup, despues queda cacheado en el volumen).
    # Sin esto, Keycloak crashea con "Driver does not support the provided
    # URL: jdbc:postgresql://..." porque la imagen viene pre-buildeada con
    # driver H2.
    command:
      - start
      - --import-realm
      - --db=postgres
      - --hostname-strict=false
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD requerido}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER requerido}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD requerido}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/realm-templates:/opt/keycloak/data/import:ro
    # ports: removed — EasyPanel maneja exposicion via su reverse-proxy.
    # Acceso al admin UI de Keycloak via EasyPanel domain mapping.
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: platform-prod-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-2gb}
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD requerido}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: platform-prod-minio
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER requerido}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD requerido}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    # Sin ports exposes — content-service accede por la red interna.

  # ── Observabilidad ────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    container_name: platform-prod-otel-collector
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - jaeger
      - prometheus
      - loki
    networks:
      - default

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: platform-prod-jaeger
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - default
    # Sin ports exposes. Para acceder al UI usar SSH tunnel:
    # ssh -L 16686:localhost:16686 vps-utn

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: platform-prod-prometheus
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-21d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-20GB}"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts:/etc/prometheus/alerts:ro
      - prom_data:/prometheus
    networks:
      - default

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: platform-prod-alertmanager
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - default

  loki:
    image: grafana/loki:3.7.1
    container_name: platform-prod-loki
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  grafana:
    image: grafana/grafana:11.3.0
    container_name: platform-prod-grafana
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER requerido}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD requerido}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    # ports: removed — EasyPanel mapea dominio al container internamente.
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - default

  # ════════════════════════════════════════════════════════════════════
  # CAPA DE APLICACION — 10 servicios Python
  # integrity-attestation-service NO esta aca (vive en VPS UTN aparte, ADR-021)
  # ════════════════════════════════════════════════════════════════════

  api-gateway:
    <<: *service-defaults
    container_name: platform-prod-api-gateway
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      # Modo demo temporal: permitir identidad via headers/fallback demo en gateway.
      # IMPORTANTE: volver a "false" cuando se habilite login JWT real.
      DEV_TRUST_HEADERS: "true"
      JWT_ISSUER: ${JWT_ISSUER:?JWT_ISSUER requerido para prod}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-platform-backend}
      JWT_JWKS_URI: ${JWT_JWKS_URI:?JWT_JWKS_URI requerido para prod}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS requerido, lista separada por coma}
      RATE_LIMIT_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      RATE_LIMIT_ENABLED: "true"
      # Service discovery (red interna)
      ACADEMIC_SERVICE_URL: http://academic-service:8002
      EVALUATION_SERVICE_URL: http://evaluation-service:8004
      ANALYTICS_SERVICE_URL: http://analytics-service:8005
      TUTOR_SERVICE_URL: http://tutor-service:8006
      CTR_SERVICE_URL: http://ctr-service:8007
      CLASSIFIER_SERVICE_URL: http://classifier-service:8008
      CONTENT_SERVICE_URL: http://content-service:8009
      GOVERNANCE_SERVICE_URL: http://governance-service:8010
      AI_GATEWAY_URL: http://ai-gateway:8011
    # ports: removed — EasyPanel mapea el dominio externo al puerto 8000
    # del container internamente. Otros containers le pegan via http://api-gateway:8000
    depends_on:
      - redis
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  academic-service:
    <<: *service-defaults
    container_name: platform-prod-academic-service
    build:
      context: ..
      dockerfile: apps/academic-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      ACADEMIC_DB_URL: postgresql+asyncpg://academic_user:${ACADEMIC_DB_PASSWORD:?ACADEMIC_DB_PASSWORD requerido}@postgres:5432/academic_main
    depends_on:
      postgres:
        condition: service_healthy

  evaluation-service:
    <<: *service-defaults
    container_name: platform-prod-evaluation-service
    build:
      context: ..
      dockerfile: apps/evaluation-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      ACADEMIC_DB_URL: postgresql+asyncpg://academic_user:${ACADEMIC_DB_PASSWORD}@postgres:5432/academic_main
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    <<: *service-defaults
    container_name: platform-prod-analytics-service
    build:
      context: ..
      dockerfile: apps/analytics-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      ACADEMIC_DB_URL: postgresql+asyncpg://academic_user:${ACADEMIC_DB_PASSWORD}@postgres:5432/academic_main
      CTR_STORE_URL: postgresql+asyncpg://ctr_user:${CTR_DB_PASSWORD:?CTR_DB_PASSWORD requerido}@postgres:5432/ctr_store
      CLASSIFIER_DB_URL: postgresql+asyncpg://classifier_user:${CLASSIFIER_DB_PASSWORD:?CLASSIFIER_DB_PASSWORD requerido}@postgres:5432/classifier_db
    depends_on:
      postgres:
        condition: service_healthy

  tutor-service:
    <<: *service-defaults
    container_name: platform-prod-tutor-service
    build:
      context: ..
      dockerfile: apps/tutor-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AI_GATEWAY_URL: http://ai-gateway:8011
      ACADEMIC_SERVICE_URL: http://academic-service:8002
      CTR_SERVICE_URL: http://ctr-service:8007
      CONTENT_SERVICE_URL: http://content-service:8009
      GOVERNANCE_SERVICE_URL: http://governance-service:8010
      PROMPTS_REPO_PATH: /var/lib/platform/prompts
    volumes:
      - ./prompts:/var/lib/platform/prompts:ro
    depends_on:
      - redis

  ctr-service:
    <<: *service-defaults
    container_name: platform-prod-ctr-service
    build:
      context: ..
      dockerfile: apps/ctr-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      CTR_STORE_URL: postgresql+asyncpg://ctr_user:${CTR_DB_PASSWORD}@postgres:5432/ctr_store
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Default del docker-entrypoint = server. Lo declaramos explicito por
      # claridad (los workers usan CTR_MODE=worker).
      CTR_MODE: server
    depends_on:
      postgres:
        condition: service_healthy

  classifier-service:
    <<: *service-defaults
    container_name: platform-prod-classifier-service
    build:
      context: ..
      dockerfile: apps/classifier-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      CLASSIFIER_DB_URL: postgresql+asyncpg://classifier_user:${CLASSIFIER_DB_PASSWORD}@postgres:5432/classifier_db
      CTR_STORE_URL: postgresql+asyncpg://ctr_user:${CTR_DB_PASSWORD}@postgres:5432/ctr_store
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  content-service:
    <<: *service-defaults
    container_name: platform-prod-content-service
    build:
      context: ..
      dockerfile: apps/content-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      CONTENT_DB_URL: postgresql+asyncpg://content_user:${CONTENT_DB_PASSWORD:?CONTENT_DB_PASSWORD requerido}@postgres:5432/content_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AI_GATEWAY_URL: http://ai-gateway:8011
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  governance-service:
    <<: *service-defaults
    container_name: platform-prod-governance-service
    build:
      context: ..
      dockerfile: apps/governance-service/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      PROMPTS_REPO_PATH: /var/lib/platform/prompts
    volumes:
      - ./prompts:/var/lib/platform/prompts:ro

  ai-gateway:
    <<: *service-defaults
    container_name: platform-prod-ai-gateway
    build:
      context: ..
      dockerfile: apps/ai-gateway/Dockerfile
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME_PREFIX: platform
      # BYOK master key — encripta BYOKKey.encrypted_value (AES-256-GCM).
      # Generar con: openssl rand -base64 32. NUNCA loggear, NUNCA versionar.
      BYOK_MASTER_KEY: ${BYOK_MASTER_KEY:?BYOK_MASTER_KEY requerido (32 bytes base64)}
      ACADEMIC_DB_URL: postgresql+asyncpg://academic_user:${ACADEMIC_DB_PASSWORD}@postgres:5432/academic_main
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════
  # CAPA WORKERS CTR — single-writer por particion (ADR-010, NUM_PARTITIONS=8)
  # Cada worker consume el stream ctr.p<N> y persiste a Postgres ctr_store.
  # Mismo build que ctr-service. El ENTRYPOINT del Dockerfile es un script
  # dispatcher que arranca worker o server segun CTR_MODE. Asi NO usamos
  # `command:` (robusto contra overrides de EasyPanel que lo pisarian).

  ctr-worker-0:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-0
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "0"

  ctr-worker-1:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-1
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "1"

  ctr-worker-2:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-2
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "2"

  ctr-worker-3:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-3
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "3"

  ctr-worker-4:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-4
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "4"

  ctr-worker-5:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-5
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "5"

  ctr-worker-6:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-6
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "6"

  ctr-worker-7:
    <<: *ctr-worker-defaults
    container_name: platform-prod-ctr-worker-7
    environment:
      <<: *ctr-worker-env
      CTR_WORKER_PARTITION: "7"

  # ════════════════════════════════════════════════════════════════════
  # CAPA FRONTEND — nginx sirviendo los 3 SPAs + proxy /api/ -> api-gateway
  # Build context: root del repo (pnpm workspace requiere lockfile y packages/*).
  # El Nginx externo del VPS (TLS termination) reverse-proxea a 127.0.0.1:8080.
  # ════════════════════════════════════════════════════════════════════

  frontends:
    container_name: platform-prod-frontends
    build:
      context: ..
      dockerfile: infrastructure/frontends.Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - default
    # ports: removed — EasyPanel mapea el dominio publico al puerto 80
    # del container (donde escucha el nginx interno).
    depends_on:
      - api-gateway

volumes:
  pg_data:
  kc_data:
  redis_data:
  minio_data:
  prom_data:
  alertmanager_data:
  grafana_data:

networks:
  default:
    name: platform-prod
