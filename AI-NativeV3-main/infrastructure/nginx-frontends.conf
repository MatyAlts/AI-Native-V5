# Nginx interno del container `frontends`. Sirve los 3 builds Vite + proxea
# /api/ al api-gateway (red interna platform-prod, sin TLS — el TLS lo
# termina el Nginx externo del VPS).
#
# Layout de paths:
#   /admin/   -> web-admin   (panel administrativo)
#   /teacher/ -> web-teacher (docentes, JTP)
#   /         -> web-student (default — alumnos, fallback en root)
#   /api/     -> proxy a api-gateway:8000 (red interna Docker)

# Resolver del DNS interno de Docker. Sin esto, nginx resuelve los
# nombres de upstream una sola vez al arrancar — si `api-gateway` aún no
# está corriendo, nginx muere con "host not found in upstream".
# Con resolver + variable en proxy_pass, nginx resuelve runtime y reintenta.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_user_id $final_user_id {
    default   "c8a54501-e2a5-434f-b043-83e11600eabc";
    "~."      $http_x_user_id;
}

# Cache-busting de los SPA. Los assets de Vite llevan hash en el nombre
# (app-AbC123.js) → se pueden cachear "immutable" para siempre. El HTML
# (index.html y cualquier ruta del SPA) NUNCA se cachea: asi, apenas se
# deploya una imagen nueva, el browser pide el index fresco que referencia
# los assets con el hash nuevo. Sin esto, el browser servia el index viejo
# y quedaba pegado a un bundle anterior tras el deploy.
map $uri $cache_control {
    default                                                              "no-cache";
    "~*\.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|wasm|map)$"  "public, max-age=31536000, immutable";
}

# Cierre del bypass de auth (2026-06). El api-gateway corre con
# dev_trust_headers=true (login JWT real aún no integrado en todos los flujos),
# así que un request a /api/ SIN Bearer era aceptado con los roles que inyecta
# este nginx (incluido superadmin) → cualquiera con curl era superadmin.
#
# Estrategia: Basic Auth que se SALTEA cuando viene un Bearer válido. Los
# frontends de alumno/docente mandan el JWT de Clerk (→ auth_basic off, el
# gateway valida el token). El panel admin (hardcoded, sin Clerk todavía) y
# cualquier request sin Bearer caen al Basic Auth → un anónimo sin la
# credencial recibe 401 en nginx y no llega al API.
map $http_authorization $admin_auth_realm {
    "~*^Bearer\s+.+"  off;
    default           "AI-Native (acceso restringido)";
}

# Authorization a REENVIAR al gateway: solo el Bearer de Clerk. Si el header es
# `Basic ...` (el panel admin tras pasar el auth_basic de nginx), NO se reenvía
# — el gateway intentaría validarlo como Bearer y daría 401. Sin Authorization,
# el gateway cae a dev_trust_headers y usa los X-* de rol que inyecta nginx.
map $http_authorization $fwd_authorization {
    "~*^Bearer\s+.+"  $http_authorization;
    default           "";
}

server {
    listen 80 default_server;
    server_name _;

    # Tamaño max de upload (materiales, CSV bulk-import).
    client_max_body_size 50M;

    # Ocultar la versión de nginx en el header Server (FIX-16, F-10).
    server_tokens off;

    # Security headers (FIX-06, F-04). Headers de bajo riesgo aplicados a todas
    # las respuestas (`always`). NO se incluye Content-Security-Policy ni HSTS
    # acá a propósito: el CSP requiere whitelistear Pyodide (cdn.jsdelivr.net +
    # 'wasm-unsafe-eval'), los web-workers de Monaco (blob:) y los dominios de
    # Clerk — un CSP mal armado rompe el editor de código. Queda pendiente una
    # pasada dedicada con testing en navegador antes de habilitarlo.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache-Control derivado por extensión (ver `map $uri $cache_control`).
    # `always` para que aplique también a respuestas 304/404 del SPA.
    add_header Cache-Control $cache_control always;

    # Compression para bundles JS/CSS.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # ─── web-admin ───────────────────────────────────────────────────
    # Panel admin hardcoded (sin Clerk). Protegido con Basic Auth para que no
    # quede abierto a cualquiera mientras no exista el control por email.
    location /admin/ {
        auth_basic           "AI-Native (panel admin)";
        auth_basic_user_file /etc/nginx/.htpasswd;
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ─── web-teacher ─────────────────────────────────────────────────
    location /teacher/ {
        alias /usr/share/nginx/html/teacher/;
        try_files $uri $uri/ /teacher/index.html;
    }

    # ─── API proxy hacia api-gateway interno ─────────────────────────
    # Importante: viene ANTES del catch-all `/` para que /api/* no caiga
    # al SPA del student.
    location /api/ {
        # Basic Auth salvo que venga un Bearer (ver `map $admin_auth_realm`):
        # con Bearer → off (lo valida el gateway); sin Bearer → exige credencial
        # → corta el bypass anónimo a /api/.
        auth_basic           $admin_auth_realm;
        auth_basic_user_file /etc/nginx/.htpasswd;

        set $api_gateway_upstream "ai_native_tutor-socratico-api-gateway:8000";
        proxy_pass http://$api_gateway_upstream;
        proxy_http_version 1.1;
        # Solo reenviar Authorization si es Bearer (no el Basic del admin).
        proxy_set_header Authorization $fwd_authorization;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id    $final_user_id;
        proxy_set_header X-Tenant-Id  aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa;
        proxy_set_header X-User-Email docente01@demo-uni.edu;
        proxy_set_header X-User-Roles superadmin,docente_admin,docente,estudiante,classifier_worker;

        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── web-student (root + catch-all) ──────────────────────────────
    location / {
        alias /usr/share/nginx/html/student/;
        try_files $uri $uri/ /index.html;
    }
}
