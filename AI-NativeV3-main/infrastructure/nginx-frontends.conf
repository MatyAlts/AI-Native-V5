# Nginx interno del container `frontends`. Sirve los 3 builds Vite + proxea
# /api/ al api-gateway (red interna platform-prod, sin TLS — el TLS lo
# termina el Nginx externo del VPS).
#
# Layout de paths:
#   /admin/   -> web-admin   (panel administrativo)
#   /teacher/ -> web-teacher (docentes, JTP)
#   /         -> web-student (default — alumnos, fallback en root)
#   /api/     -> proxy a api-gateway:8000 (red interna Docker)

# Resolver del DNS interno de Docker. Sin esto, nginx resuelve los
# nombres de upstream una sola vez al arrancar — si `api-gateway` aún no
# está corriendo, nginx muere con "host not found in upstream".
# Con resolver + variable en proxy_pass, nginx resuelve runtime y reintenta.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_user_id $final_user_id {
    default   "c8a54501-e2a5-434f-b043-83e11600eabc";
    "~."      $http_x_user_id;
}

server {
    listen 80 default_server;
    server_name _;

    # Tamaño max de upload (materiales, CSV bulk-import).
    client_max_body_size 50M;

    # Compression para bundles JS/CSS.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # ─── web-admin ───────────────────────────────────────────────────
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ─── web-teacher ─────────────────────────────────────────────────
    location /teacher/ {
        alias /usr/share/nginx/html/teacher/;
        try_files $uri $uri/ /teacher/index.html;
    }

    # ─── API proxy hacia api-gateway interno ─────────────────────────
    # Importante: viene ANTES del catch-all `/` para que /api/* no caiga
    # al SPA del student.
    location /api/ {
        set $api_gateway_upstream "ai_native_tutor-socratico-api-gateway:8000";
        proxy_pass http://$api_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id    $final_user_id;
        proxy_set_header X-Tenant-Id  aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa;
        proxy_set_header X-User-Email docente01@demo-uni.edu;
        proxy_set_header X-User-Roles superadmin,docente_admin,docente,estudiante,classifier_worker;

        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── web-student (root + catch-all) ──────────────────────────────
    location / {
        alias /usr/share/nginx/html/student/;
        try_files $uri $uri/ /index.html;
    }
}
