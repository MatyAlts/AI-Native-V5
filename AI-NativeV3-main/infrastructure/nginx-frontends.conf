# Nginx interno del container `frontends`. Sirve los 3 builds Vite + proxea
# /api/ al api-gateway (red interna platform-prod, sin TLS — el TLS lo
# termina el Nginx externo del VPS).
#
# Layout de paths:
#   /admin/   -> web-admin   (panel administrativo)
#   /teacher/ -> web-teacher (docentes, JTP)
#   /         -> web-student (default — alumnos, fallback en root)
#   /api/     -> proxy a api-gateway:8000 (red interna Docker)

server {
    listen 80 default_server;
    server_name _;

    # Tamaño max de upload (materiales, CSV bulk-import).
    client_max_body_size 50M;

    # Compression para bundles JS/CSS.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # ─── web-admin ───────────────────────────────────────────────────
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ─── web-teacher ─────────────────────────────────────────────────
    location /teacher/ {
        alias /usr/share/nginx/html/teacher/;
        try_files $uri $uri/ /teacher/index.html;
    }

    # ─── API proxy hacia api-gateway interno ─────────────────────────
    # Importante: viene ANTES del catch-all `/` para que /api/* no caiga
    # al SPA del student.
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (tutor-service stream) — sin buffering ni timeout corto.
        proxy_buffering   off;
        proxy_cache       off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── web-student (root + catch-all) ──────────────────────────────
    location / {
        alias /usr/share/nginx/html/student/;
        try_files $uri $uri/ /index.html;
    }
}
