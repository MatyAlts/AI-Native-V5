global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # El Collector expone las métricas OTLP convertidas a Prometheus en :8889
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Self-monitoring del propio Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
