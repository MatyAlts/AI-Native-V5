[project]
name = "platform-test-utils"
version = "0.1.0"
description = "Fixtures y helpers compartidos para tests de todos los servicios"
requires-python = ">=3.12,<3.13"

dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "testcontainers[postgres,redis]>=4.8",
    "httpx>=0.27",
    "hypothesis>=6.108",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_test_utils"]
