[project]
name = "platform-ops"
version = "0.1.0"
description = "Scripts de ops: onboarding de tenants, backups, exports"
requires-python = ">=3.12,<3.13"

dependencies = [
    "httpx>=0.27",
    "cryptography>=44.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "aiosqlite>=0.20",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_ops"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
