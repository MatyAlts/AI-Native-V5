[project]
name = "platform-contracts"
version = "0.1.0"
description = "Schemas de eventos del bus compartidos entre servicios"
requires-python = ">=3.12,<3.13"

dependencies = [
    "pydantic>=2.8",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "hypothesis>=6.108",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_contracts"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
